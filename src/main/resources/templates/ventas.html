<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8">
  <title>Categorias - Sistema de Ventas</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

  <script th:src="@{/js/tema.js}"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link th:href="@{/css/menu.css}" rel="stylesheet">
  <link th:href="@{/css/menu1.css}" rel="stylesheet">
  <link th:href="@{/css/modal.css}" rel="stylesheet">
  <link th:href="@{/css/vencom.css}" rel="stylesheet">
  <style>

    #buscadorPOS:focus {
      outline: none !important;
      box-shadow: none !important;
      border-color: rgba(0, 0, 0, 0.1) !important;
    }


    .input-group #buscadorPOS:focus {
      z-index: 1;
    }

    html.dark-mode .custom-table thead th {
      background-color: #2A3651FF !important;
      color: #ffffff !important;
      border-bottom: 2px solid #171f39 !important;
      text-align: center;
      padding: 15px !important;
    }

    .table-responsive {
      overflow-x: auto !important;
      display: block !important;
    }


    @media (max-width: 768px) {

      .table-responsive table {
        min-width: 700px !important;
        margin-bottom: 20px !important;
      }


      .table-responsive thead.sticky-top {
        position: relative !important;
        top: auto !important;
      }


      .crud-card {
        overflow: visible !important;
      }
    }


    .btn-nuevo-cliente-fijo {
      background-color: #4b6cb7;
      color: #fff;
      border: none;
      padding: 8px 18px;
      font-size: 0.85rem;
      border-radius: 12px;

    }

    .btn-nuevo-cliente-fijo:hover {
      background-color: #3b5998 !important; ;
      color: #fff !important;
    }

    .swal2-confirm:focus {
      box-shadow: none !important;
      outline: none !important;
    }

  </style>
</head>
<body>

<!-- Sidebar -->
<div th:replace="~{fragments/layout :: sidebar}"></div>

<!-- Topbar -->
<div th:replace="~{fragments/layout :: topbar}"></div>

<main class="content" id="mainContent" style="padding-bottom: 80px;">
  <div class="container-fluid">
    <div class="mb-4">
      <h2 class="fw-bold text-dynamic mb-1 fs-3">Nueva Venta</h2>
      <p class="text-muted-dynamic mb-0 fs-6">Genera un comprobante y actualiza el inventario al instante</p>
    </div>

    <form th:action="@{/ventas/guardar}" th:object="${venta}" method="post" id="formVenta">
      <div class="row g-4">
        <div class="col-lg-8">
          <div class="crud-card p-4 shadow mb-4">
            <div class="d-flex justify-content-between align-items-center mb-3 border-bottom pb-2">
              <h5 class="fw-bold mb-0 text-dynamic fs-5">Agregar Productos</h5>
            </div>
            <div class="input-group shadow-sm border rounded-3 overflow-hidden bg-transparent">
              <span class="input-group-text bg-transparent border-0 py-3 ps-3"><i class="fas fa-barcode text-muted-dynamic"></i></span>
              <input type="text" id="buscadorVenta" class="form-control border-0 py-3 bg-transparent text-dynamic"
                     placeholder="Escanea o busca el producto..." list="listaProductos" autocomplete="off">
              <datalist id="listaProductos">
                <option th:each="p : ${productos}"
                        th:value="${p.nombreProducto}"
                        th:data-id="${p.idProducto}"
                        th:data-precio="${p.precio}"
                        th:data-stock="${p.stock}"
                        th:data-unidad="${p.unidadMedida}"
                        th:data-barcode="${p.codigoBarras}"
                        th:text="${p.unidadMedida == 'KG' ? 'Stock: ' + p.stock + 'kg' : 'Stock: ' + p.stock} + ' - S/ ' + p.precio">
                </option>
              </datalist>
            </div>
          </div>

          <div class="crud-card p-0 shadow overflow-hidden">
            <div class="table-responsive" style="max-height: 400px;">
              <table class="table custom-table align-middle mb-0">
                <thead class="sticky-top">
                <tr class="text-muted">
                  <th class="text-center">Producto</th>
                  <th class="text-center">Precio Uni/Kg</th>
                  <th class="text-center">Cantidad/Peso</th>
                  <th class="text-center">Subtotal</th>
                  <th class="text-center">Acciones</th>
                </tr>
                </thead>
                <tbody id="tbodyDetalles">
                <tr id="msgVacio">
                  <td colspan="5">
                    <div class="p-5 text-center text-muted-dynamic">
                      <i class="fas fa-shopping-basket fa-3x mb-3 opacity-25"></i>
                      <p>No hay productos en el carrito</p>
                    </div>
                  </td>
                </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>

        <div class="col-lg-4">
          <div class="sticky-top" style="top: 20px;">
            <div class="crud-card p-4 shadow">
              <h5 class="fw-bold mb-4 text-dynamic fs-5 border-bottom pb-2">Resumen de Venta</h5>

              <div class="mb-3">
                <div class="d-flex justify-content-between align-items-end mb-2">
                  <label class="form-label small fw-bold text-muted-dynamic mb-0">Cliente</label>
                  <button type="button"
                          class="btn btn-nuevo-cliente-fijo shadow-sm"
                          data-bs-toggle="modal"
                          data-bs-target="#modalNuevoCliente">
                    <i class="fas fa-user-plus me-1"></i>Nuevo
                  </button>
                </div>

                <div class="input-group border rounded-3 overflow-hidden bg-white-dynamic shadow-sm">
                  <input type="text" id="inputCliente" class="form-control border-0 bg-transparent text-dynamic py-2"
                         placeholder="Escribe para buscar cliente..." list="listaClientes" autocomplete="off" required>

                  <input type="hidden" th:field="*{cliente.idCliente}" id="clienteId">

                  <datalist id="listaClientes">
                    <option th:each="c : ${clientes}"
                            th:value="${c.nombre + ' ' + c.apellidoPat}"
                            th:data-id="${c.idCliente}"></option>
                  </datalist>
                </div>
              </div>

              <div class="row">
                <div class="col-6 mb-3">
                  <label class="form-label small fw-bold text-muted-dynamic">Tipo de Venta</label>
                  <select th:field="*{tipoVenta}" class="form-select border-0 shadow-sm bg-light-dynamic" id="tipoVenta">
                    <option value="CONTADO">Contado</option>
                    <option value="CREDITO">Crédito</option>
                  </select>
                </div>
                <div class="col-6 mb-3">
                  <label class="form-label small fw-bold text-muted-dynamic">Método de Pago</label>
                  <select th:field="*{metodoPago}" class="form-select border-0 shadow-sm bg-light-dynamic" id="selectMetodo">
                    <option value="Efectivo">Efectivo</option>
                    <option value="Yape">Yape</option>
                    <option value="Plin">Plin</option>
                  </select>
                </div>
              </div>

              <div class="contenedor-total-ticket shadow-sm mb-4">
                <span class="titulo-total">TOTAL A PAGAR</span>
                <div class="monto-total">
                  S/ <span id="labelTotal">0.00</span>
                </div>
                <input type="hidden" th:field="*{totalVenta}" id="inputTotalVenta">
              </div>

              <div id="wrapperVuelto" class="bg-light-dynamic p-3 rounded-3 mb-4 border border-dashed shadow-sm">
                <div class="d-flex justify-content-between align-items-center mb-2">
                  <span id="labelPagaCon" class="small fw-bold">Paga con:</span>
                  <input type="number" step="0.01" class="form-control form-control-sm text-end fw-bold"
                         id="montoPagado" th:field="*{montoPagado}" style="max-width: 120px;" placeholder="0.00">
                </div>
                <div class="d-flex justify-content-between align-items-center fw-bold border-top pt-2 mt-2">
                  <span id="tituloEstadoFinanciero" class="small text-muted-dynamic">Vuelto:</span>
                    <span class="fw-bold fs-2">
                      S/ <span id="labelVuelto">0.00</span>
                  </span>
                </div>
              </div>

              <button type="submit" id="btnGuardar" class="btn btn-primary w-100 py-3 rounded-pill fw-bold shadow" disabled>
                <i class="fas fa-check-circle me-2"></i> Finalizar Venta
              </button>

              <a href="/ventas" class="btn btn-outline-secondary w-100 mt-2 py-2 rounded-pill small">
                <i class="fas fa-times me-1"></i> Cancelar
              </a>
            </div>
          </div>
        </div>
      </div>
    </form>
  </div>
</main>

<div class="modal fade" id="modalNuevoCliente" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 shadow-lg custom-modal" style="border-radius: 15px">
      <div class="modal-header border-0 p-4" style="background: linear-gradient(45deg, #4b6cb7, #182848); border-radius: 15px 15px 0 0;">
        <h5 class="modal-title fw-bold text-white"><i class="fas fa-user-plus me-2"></i>Nuevo Cliente</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body p-4">
        <div class="mb-4">
          <label class="form-label fw-bold text-dynamic">Nombre</label>
          <div class="input-group custom-input-group">
            <span class="input-group-text"><i class="fas fa-user"></i></span>
            <input type="text" id="reg_nombre" class="form-control"
                   placeholder="Ej: Jairo" required autocomplete="off">
          </div>
        </div>

        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label fw-bold text-dynamic">Apellido Paterno</label>
            <input type="text" id="reg_apellidoPat" class="form-control"
                   placeholder="Quispe" required autocomplete="off">
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label fw-bold text-dynamic">Apellido Materno</label>
            <input type="text" id="reg_apellidoMat" class="form-control"
                   placeholder="Canazas" autocomplete="off">
          </div>
        </div>
      </div>

      <div class="modal-footer border-0 p-4 pt-0">
        <button type="button" class="btn btn-secondary px-4 rounded-pill" data-bs-dismiss="modal">Cancelar</button>
        <button type="button" onclick="guardarClienteRapido()" class="btn btn-new-cat px-4 rounded-pill shadow-neon" style="border-radius: 8px !important;">
          <i class="fas fa-save me-1"></i> Guardar Cliente
        </button>
      </div>
    </div>
  </div>
</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/menu.js}"></script>
<script>

  const buscador = document.getElementById('buscadorVenta');
  const datalistProd = document.getElementById('listaProductos');
  const inputCliente = document.getElementById('inputCliente');
  const datalistCli = document.getElementById('listaClientes');
  const selectTipoVenta = document.getElementById('tipoVenta');
  const inputMontoPagado = document.getElementById('montoPagado');
  const selectMetodo = document.getElementById('selectMetodo');
  const labelVuelto = document.getElementById("labelVuelto");
  const wrapperVuelto = document.getElementById('wrapperVuelto');


  function guardarCarritoLocal() {
    const productos = [];
    document.querySelectorAll('#tbodyDetalles tr[data-id]').forEach(tr => {
      productos.push({
        id: tr.getAttribute('data-id'),
        nombre: tr.querySelector('.fw-bold').innerText,
        precio: parseFloat(tr.querySelector('.input-precio').value),
        stockMax: parseFloat(tr.getAttribute('data-stock-max')),
        unidad: tr.getAttribute('data-unidad'),
        cantidad: tr.querySelector('.input-cantidad').value
      });
    });
    localStorage.setItem('carrito_bodega', JSON.stringify(productos));
  }

  function cargarCarritoLocal() {
    const guardado = localStorage.getItem('carrito_bodega');
    if (guardado) {
      const productos = JSON.parse(guardado);
      productos.forEach(p => {
        ejecutarAgregar(p.id, p.nombre, p.precio, p.stockMax, p.unidad, p.cantidad);
      });
      actualizarTotales();
    }
  }

  function guardarClienteRapido() {
    const nombre = document.getElementById('reg_nombre').value.trim();
    const apePat = document.getElementById('reg_apellidoPat').value.trim();
    const apeMat = document.getElementById('reg_apellidoMat').value.trim();

    if (!nombre || !apePat) {
      Swal.fire({
        title: 'Atención',
        text: 'Nombre y Apellido Paterno son obligatorios.',
        icon: 'warning',
        confirmButtonColor: '#4b6cb7',
        focusConfirm: false
      });
      return;
    }

    const clienteData = {
      nombre: nombre,
      apellidoPat: apePat,
      apellidoMat: apeMat
    };

    fetch('/clientes/guardar-rapido', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(clienteData)
    })
            .then(async response => {
              const text = await response.text();
              if (!response.ok) throw new Error(text);
              return JSON.parse(text);
            })
            .then(data => {
              const nombreCompleto = `${data.nombre} ${data.apellidoPat} ${data.apellidoMat || ''}`.trim();


              const lista = document.getElementById('listaClientes');

              if (lista) {
                const option = document.createElement('option');
                option.value = nombreCompleto;
                option.setAttribute('data-id', data.idCliente);
                lista.appendChild(option);
              } else {
                console.warn("No se encontró el datalist 'listaClientes', pero el cliente se guardó.");
              }


              if (inputCliente) inputCliente.value = nombreCompleto;

              const inputId = document.getElementById('clienteId');
              if (inputId) inputId.value = data.idCliente;


              const modalElement = document.getElementById('modalNuevoCliente');
              if (modalElement) {
                const instance = bootstrap.Modal.getInstance(modalElement);
                if (instance) instance.hide();
              }

              document.getElementById('reg_nombre').value = "";
              document.getElementById('reg_apellidoPat').value = "";
              document.getElementById('reg_apellidoMat').value = "";

              Swal.fire({
                title: '¡Éxito!',
                text: 'Cliente registrado y seleccionado.',
                icon: 'success',
                confirmButtonColor: '#4b6cb7',
                focusConfirm: false
              });
            })
            .catch(error => {
              Swal.fire({
                title: 'Error',
                text: error.message,
                icon: 'error',
                confirmButtonColor: '#4b6cb7',
                focusConfirm: false
              });
            });
  }


  inputCliente.addEventListener('input', function() {
    const opcion = Array.from(datalistCli.options).find(opt => opt.value === this.value);
    if (opcion) {
      document.getElementById('clienteId').value = opcion.getAttribute('data-id');
    } else {
      document.getElementById('clienteId').value = "";
    }
  });


  buscador.addEventListener('input', function(e) {
    const valorBusqueda = e.target.value.trim();
    const opcion = Array.from(datalistProd.options).find(opt =>
            opt.value === valorBusqueda || opt.getAttribute('data-barcode') === valorBusqueda
    );

    if (opcion) {
      const id = opcion.getAttribute('data-id');
      const nombre = opcion.value;
      const precio = parseFloat(opcion.getAttribute('data-precio'));
      const stock = parseFloat(opcion.getAttribute('data-stock'));
      const unidad = opcion.getAttribute('data-unidad');

      if(stock <= 0) {
        Swal.fire({
          title: 'Sin Stock',
          text: 'Este producto no tiene existencias.',
          icon: 'warning',
          confirmButtonColor: '#4b6cb7',
          focusConfirm: false
        });
        this.value = "";
        return;
      }

      ejecutarAgregar(id, nombre, precio, stock, unidad);
      this.value = "";
      this.focus();
    }
  });


  function ejecutarAgregar(id, nombre, precio, stockMax, unidad, cantidadInicial = 1) {
    const filaExistente = document.getElementById(`f_${id}`);

    if (filaExistente) {
      const input = filaExistente.querySelector('.input-cantidad');
      let actual = parseFloat(input.value) || 0;
      let paso = (unidad === 'KG') ? 0.100 : 1;

      if ((actual + paso) <= stockMax) {
        input.value = (unidad === 'KG') ? (actual + paso).toFixed(3) : (actual + paso);
      }
      actualizarTotales();
      return;
    }

    const step = (unidad === 'KG') ? "0.001" : "1";
    const fila = `
    <tr id="f_${id}" data-id="${id}" data-stock-max="${stockMax}" data-unidad="${unidad}" class="align-middle border-bottom">
        <td class="ps-4 py-3 text-center"> <input type="hidden" class="prod-id" value="${id}">
            <span class="fw-bold text-dynamic d-block">${nombre}</span>
            <small class="text-muted-dynamic">Stock: ${stockMax} ${unidad}</small>
        </td>
        <td class="text-center fw-bold"> S/ ${precio.toFixed(2)}
            <input type="hidden" class="input-precio" value="${precio}">
        </td>
        <td class="text-center" style="width: 110px;"> <input type="number" step="${step}"
                   class="form-control form-control-sm input-cantidad text-center fw-bold shadow-sm mx-auto"
                   value="${cantidadInicial}"
                   oninput="validarManual(this, ${stockMax})"
                   onclick="this.select()"
                   style="max-width: 90px;">
        </td>
        <td class="text-center fw-bold text-dynamic"> S/ <span class="subtotal-fila">0.00</span>
        </td>
        <td class="text-center">
            <button type="button" onclick="quitar('${id}')" class="btn btn-danger btn-sm rounded-circle shadow-sm">
                <i class="fa-solid fa-trash-can"></i>
            </button>
        </td>
    </tr>`;

    document.getElementById("tbodyDetalles").insertAdjacentHTML('afterbegin', fila);
    document.getElementById("msgVacio").classList.add('d-none');
    actualizarTotales();
  }


  function validarManual(input, stockMax) {
    let valor = parseFloat(input.value);
    if (isNaN(valor)) return;
    if (valor > stockMax) {
      input.value = stockMax;
      Swal.fire({
        title: 'Stock Insuficiente',
        text: 'Máximo disponible: ' + stockMax,
        icon: 'warning',
        confirmButtonColor: '#4b6cb7'
      });
    }
    if (valor < 0) input.value = 0;
    actualizarTotales();
  }


  selectTipoVenta.addEventListener('change', actualizarInterfazCredito);
  inputMontoPagado.addEventListener('input', calcularVuelto);
  selectMetodo.addEventListener('change', calcularVuelto);

  function actualizarInterfazCredito() {
    const tipoVenta = selectTipoVenta.value;
    const labelPagaCon = document.getElementById('labelPagaCon');
    const tituloEstado = document.getElementById('tituloEstadoFinanciero');

    if (tipoVenta === "CREDITO") {
      if(labelPagaCon) labelPagaCon.innerText = "Inicial / Adelanto:";
      if(tituloEstado) tituloEstado.innerText = "Debe:";
      // Se eliminó la línea del borderLeft verde
    } else {
      if(labelPagaCon) labelPagaCon.innerText = "Paga con:";
      if(tituloEstado) tituloEstado.innerText = "Vuelto:";
      // Se eliminó la línea del borderLeft celeste
    }


    if(wrapperVuelto) wrapperVuelto.style.borderLeft = "none";

    calcularVuelto();
  }

  function actualizarTotales() {
    let acumulado = 0;
    const filasProductos = document.querySelectorAll('#tbodyDetalles tr[data-id]');
    const msgVacio = document.getElementById("msgVacio");

    filasProductos.forEach((tr, i) => {
      const cant = parseFloat(tr.querySelector('.input-cantidad').value) || 0;
      const precio = parseFloat(tr.querySelector('.input-precio').value) || 0;
      const sub = cant * precio;

      // Mostramos el subtotal en la tabla
      const spanSubtotal = tr.querySelector('.subtotal-fila');
      if(spanSubtotal) spanSubtotal.innerText = sub.toFixed(2);

      acumulado += sub;


      tr.querySelector('.prod-id').name = `detalles[${i}].producto.idProducto`;
      tr.querySelector('.input-precio').name = `detalles[${i}].precioVenta`;
      tr.querySelector('.input-cantidad').name = `detalles[${i}].cantidad`;
    });


    const labelTotal = document.getElementById("labelTotal");
    const inputTotalVenta = document.getElementById("inputTotalVenta");

    if(labelTotal) labelTotal.innerText = acumulado.toFixed(2);
    if(inputTotalVenta) inputTotalVenta.value = acumulado.toFixed(2);


    const btnGuardar = document.getElementById("btnGuardar");
    if(btnGuardar) btnGuardar.disabled = (filasProductos.length === 0);


    if(msgVacio) {
      msgVacio.style.display = (filasProductos.length === 0) ? "table-row" : "none";
    }


    calcularVuelto();
    guardarCarritoLocal();
  }


  function calcularVuelto() {
    const totalInput = document.getElementById("inputTotalVenta");
    const total = totalInput ? parseFloat(totalInput.value) || 0 : 0;
    const tipoVenta = selectTipoVenta.value;
    const pagado = parseFloat(inputMontoPagado.value) || 0;

    if (!labelVuelto) return;

    const contenedorMonto = labelVuelto.parentElement;


    const claseTamano = "fw-bold fs-3";

    if (tipoVenta === "CREDITO") {
      let deuda = total - pagado;
      if (deuda < 0) {
        inputMontoPagado.value = total.toFixed(2);
        deuda = 0;
      }
      labelVuelto.innerText = deuda.toFixed(2);


      if(contenedorMonto) {
        contenedorMonto.className = claseTamano;
        contenedorMonto.style.color = "#208b58";
      }
    } else {
      const vuelto = pagado - total;
      labelVuelto.innerText = (vuelto > 0) ? vuelto.toFixed(2) : "0.00";

      if(contenedorMonto) {
        contenedorMonto.className = claseTamano;

        contenedorMonto.style.color = (vuelto < 0 && pagado > 0) ? "#dc3545" : "#0d6efd";
      }
    }
  }

  function quitar(id) {
    const fila = document.getElementById("f_" + id);
    if (fila) {
      fila.remove();
      actualizarTotales();
    }
  }


  document.addEventListener("DOMContentLoaded", () => {
    if (buscador) buscador.focus();
    cargarCarritoLocal();
    actualizarInterfazCredito();
  });


  document.getElementById('formVenta').addEventListener('submit', function(e) {
    e.preventDefault();
    const tipo = selectTipoVenta.value;
    const total = parseFloat(document.getElementById("inputTotalVenta").value) || 0;
    const pagado = parseFloat(inputMontoPagado.value) || 0;

    if (tipo === 'CONTADO' && pagado < total) {
      Swal.fire({ title: 'Monto Insuficiente', text: 'El pago debe ser mayor o igual al total.', icon: 'error', confirmButtonColor: '#4b6cb7' });
      return;
    }

    Swal.fire({
      title: '¿Finalizar Venta?',
      text: (tipo === 'CREDITO') ? "Registra abono inicial y saldo." : "Registra pago total y descuenta stock.",
      icon: 'question',
      showCancelButton: true,
      confirmButtonColor: '#4b6cb7',
      cancelButtonColor: '#dc3545',
      confirmButtonText: 'Sí, vender',
      cancelButtonText: 'Cancelar',
      reverseButtons: true,
      focusConfirm: false
    }).then((result) => {
      if (result.isConfirmed) {
        localStorage.removeItem('carrito_bodega');
        this.submit();
      }
    });
  });
</script>
</body>
</html>
