<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Home - Sistema de Ventas</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link th:href="@{/css/menu.css}" rel="stylesheet">

</head>
<body>
<!-- Sidebar -->
<div th:replace="~{fragments/layout :: sidebar}"></div>

<!-- Topbar -->
<div th:replace="~{fragments/layout :: topbar}"></div>

<main class="content" id="mainContent">
    <div class="container-fluid">
        <div class="report-filter-bar shadow-sm mb-4">
            <div class="row align-items-center">
                <div class="col-lg-4">
                    <h4 class="fw-bold mb-0" style="color: var(--navy-dark);">Panel de Control</h4>
                    <!-- CORRECCIÓN: Ahora usa el objeto global usuarioLogueado para pintar el Nombre Real -->
                    <p class="text-muted small mb-0">Bienvenido, <span th:text="${usuarioLogueado != null ? usuarioLogueado.nombre : 'Usuario'}" class="fw-bold text-success"></span></p>
                </div>
                <div class="col-lg-8">
                    <form class="row g-2 justify-content-lg-end w-100 m-0">
                        <div class="col-12 col-md-auto">
                            <select class="form-select form-select-sm select-clean bg-light w-100">
                                <option value="diario">Hoy</option>
                                <option value="semanal">Esta Semana</option>
                                <option value="mensual">Este Mes</option>
                            </select>
                        </div>
                        <!-- Cambiado a col-12 para móvil y col-sm-6 para pantallas un poco más grandes -->
                        <div class="col-12 col-sm-6 col-md-auto">
                            <button type="button" class="btn btn-sm btn-primary btn-dash px-3 fw-bold w-100 text-nowrap">
                                <i class="fas fa-file-invoice-dollar me-1"></i> Reporte Ventas
                            </button>
                        </div>
                        <div class="col-12 col-sm-6 col-md-auto">
                            <button type="button" class="btn btn-sm btn-dark btn-dash px-3 fw-bold border-0 w-100 text-nowrap" style="background-color: var(--slate-sidebar);">
                                <i class="fas fa-file-import me-1"></i> Reporte Compras
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <div class="row g-3 mb-4">
            <div class="col-12 col-md-6 col-xl">
                <div class="card bg-dashboard-card p-3 h-100">
                    <p class="text-xs-bold text-muted mb-2">Ventas Mes</p>
                    <div class="d-flex align-items-center justify-content-between">
                        <h4 class="dynamic-value mb-0" th:text="'S/ ' + ${totalVentasMes}">S/ 0.00</h4>
                        <div class="icon-box-dash bg-success-subtle text-success"><i class="fas fa-chart-line"></i></div>
                    </div>
                </div>
            </div>
            <div class="col-12 col-md-6 col-xl">
                <div class="card bg-dashboard-card p-3 h-100">
                    <p class="text-xs-bold text-muted mb-2">Compras Mes</p>
                    <div class="d-flex align-items-center justify-content-between">
                        <h4 class="dynamic-value mb-0" th:text="'S/ ' + ${totalComprasMes}">S/ 0.00</h4>
                        <div class="icon-box-dash bg-info-subtle text-info"><i class="fas fa-shopping-cart"></i></div>
                    </div>
                </div>
            </div>
            <div class="col-12 col-md-6 col-xl">
                <div class="card bg-dashboard-card p-3 h-100">
                    <p class="text-xs-bold text-muted mb-2">N° Deudores</p>
                    <div class="d-flex align-items-center justify-content-between">
                        <h4 class="dynamic-value mb-0" th:text="${cantidadDeudores}">0</h4>
                        <div class="icon-box-dash bg-danger-subtle text-danger"><i class="fas fa-users"></i></div>
                    </div>
                </div>
            </div>
            <div class="col-12 col-md-6 col-xl">
                <div class="card bg-dashboard-card p-3 h-100">
                    <p class="text-xs-bold text-muted mb-2">Total Deuda</p>
                    <div class="d-flex align-items-center justify-content-between">
                        <h4 class="dynamic-value mb-0" th:text="'S/ ' + ${totalDeudas}">S/ 0.00</h4>
                        <div class="icon-box-dash bg-warning-subtle text-warning"><i class="fas fa-money-bill-wave"></i></div>
                    </div>
                </div>
            </div>
            <div class="col-12 col-md-6 col-xl">
                <div class="card bg-dashboard-card p-3 h-100">
                    <p class="text-xs-bold text-muted mb-2">Stock Bajo</p>
                    <div class="d-flex align-items-center justify-content-between">
                        <h4 class="dynamic-value mb-0" th:text="${productosCriticos}">0</h4>
                        <div class="icon-box-dash bg-secondary-subtle text-secondary"><i class="fas fa-box"></i></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row g-4 mb-4">
            <div class="col-12">
                <div class="card bg-dashboard-card p-4 h-100 shadow-sm">
                    <h6 class="fw-bold mb-4 text-navy" style="color: var(--navy-dark);">
                        <i class="fas fa-clock me-2 text-primary" style="color: var(--accent-blue) !important;"></i> Ventas de Hoy (Flujo por hora)
                    </h6>
                    <div style="height: 300px;">
                        <canvas id="ventasHoraChart"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <div class="row g-4">
            <div class="col-lg-6">
                <div class="card bg-dashboard-card p-3 border-top border-warning border-4 shadow-sm">
                    <h6 class="fw-bold mb-3">📦 Reposición Crítica (Top 5)</h6>
                    <div class="table-responsive">
                        <table class="table table-dash mb-0">
                            <thead><tr class="text-muted text-xs-bold"><th>Producto</th><th>Stock</th><th class="text-end">Acción</th></tr></thead>
                            <tbody>
                            <tr th:each="p : ${topProductosCriticos}">
                                <td th:text="${p.nombre}" class="fw-bold">Producto</td>
                                <td><span class="badge bg-danger-subtle text-danger" th:text="${p.stock}">0</span></td>
                                <td class="text-end"><a href="/compras/nueva" class="btn btn-sm btn-light py-0 px-2 text-xs-bold">Comprar</a></td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
            <div class="col-lg-6">
                <div class="card bg-dashboard-card p-3 border-top border-danger border-4 shadow-sm">
                    <h6 class="fw-bold mb-3">📅 Deudores más Antiguos (Top 5)</h6>
                    <div class="table-responsive">
                        <table class="table table-dash mb-0">
                            <thead><tr class="text-muted text-xs-bold"><th>Cliente</th><th>Monto</th><th class="text-end">Fecha</th></tr></thead>
                            <tbody>
                            <tr th:each="d : ${listaDeudoresAntiguos}">
                                <td th:text="${d.cliente.nombre}" class="fw-bold">Cliente</td>
                                <td class="text-danger fw-bold" th:text="'S/ ' + ${d.montoPendiente}">S/ 0</td>
                                <td class="text-end text-muted" th:text="${#temporals.format(d.fecha, 'dd/MM/yyyy')}">01/01/2026</td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/menu.js}"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script th:inline="javascript">
    document.addEventListener("DOMContentLoaded", function() {
        // 1. Gráfico de Líneas (Ventas Hoy)
        const canvasVentas = document.getElementById('ventasHoraChart');
        if (canvasVentas) {
            const ctxVentas = canvasVentas.getContext('2d');
            const datosVentas = /*[[${datosVentas}]]*/ [0, 0, 0, 0, 0, 0, 0, 0];

            new Chart(ctxVentas, {
                type: 'line',
                data: {
                    labels: ['08:00', '10:00', '12:00', '14:00', '16:00', '18:00', '20:00', '22:00'],
                    datasets: [{
                        label: 'Ventas (S/)',
                        data: datosVentas,
                        borderColor: '#3b82f6',
                        borderWidth: 3,
                        backgroundColor: 'rgba(59, 130, 246, 0.05)',
                        fill: true,
                        tension: 0.4,
                        pointRadius: 3,
                        pointBackgroundColor: '#3b82f6'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true, grid: { color: '#f1f5f9' } },
                        x: { grid: { display: false } }
                    }
                }
            });
        }

        // 2. Gráfico de Dona (Top Categorías)
        const canvasCat = document.getElementById('categoriasPieChart');
        if (canvasCat) {
            const ctxCat = canvasCat.getContext('2d');

            // Reemplaza estos nombres y valores por datos reales de tu modelo si los tienes
            const labelsCat = /*[[${nombresCategorias}]]*/ ['Electrónica', 'Hogar', 'Varios'];
            const valoresCat = /*[[${valoresCategorias}]]*/ [55, 25, 20];

            new Chart(ctxCat, {
                type: 'doughnut',
                data: {
                    labels: labelsCat,
                    datasets: [{
                        data: valoresCat,
                        backgroundColor: ['#3b82f6', '#0fc56d', '#f59e0b', '#ef4444', '#8b5cf6'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    cutout: '70%',
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: { boxWidth: 12, padding: 20, font: { size: 11 } }
                        }
                    }
                }
            });
        }
    });
</script>
</body>
</html>
