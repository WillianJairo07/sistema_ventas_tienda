<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="es">
<head>
    <meta charset="UTF-8">
    <title>Fragments</title>
</head>
<body>

<nav id="sidebar" th:fragment="sidebar" class="sidebar">

    <script>
        (function() {
            const savedStatus = localStorage.getItem('sidebarStatus') || 'sidebar-open';
            document.body.classList.add(savedStatus);
            // Evita que el menú "viaje" visualmente al cargar la página
            document.body.style.setProperty('transition', 'none', 'important');
        })();
    </script>
    <button class="edge-toggle-btn" id="sidebarToggle">
        <i class="fas fa-chevron-left toggle-icon"></i>
    </button>

    <div class="sidebar-header">
        <div class="brand-sidebar">
            <img th:src="@{/img/logo1.png}" alt="Logo">
            <span class="brand-text">SISTEMA VENTAS</span>
        </div>
    </div>

    <div class="sidebar-menu">
        <a th:href="@{/home}"><i class="fas fa-th-large"></i> <span>Inicio</span></a>
        <a th:href="@{/categorias}"><i class="fas fa-tags"></i> <span>Categorías</span></a>
        <a th:href="@{/productos}"><i class="fas fa-box"></i> <span>Productos</span></a>
        <a th:href="@{/proveedores}"><i class="fas fa-truck"></i> <span>Proveedores</span></a>
        <a th:href="@{/compras/nueva}"><i class="fas fa-file-import"></i> <span>Compras</span></a>
        <a th:href="@{/compras}"><i class="fas fa-list-alt"></i> <span>Historial Compras</span></a>
        <a th:href="@{/clientes}"><i class="fas fa-user-friends"></i> <span>Clientes</span></a>
        <a th:href="@{/ventas/nueva}"><i class="fas fa-shopping-cart"></i> <span>Realizar Venta</span></a>
        <a th:href="@{/ventas}"><i class="fas fa-history"></i> <span>Historial Ventas</span></a>
        <a th:href="@{/pagos}"><i class="fas fa-hand-holding-usd"></i> <span>Cuentas por Cobrar</span></a>

        <!-- MODIFICACIÓN: Condicional directo usando el nuevo modelo de un solo Rol -->
        <a th:href="@{/usuarios}" th:if="${usuarioLogueado != null && usuarioLogueado.rol != null && usuarioLogueado.rol.nombreRol == 'ADMIN'}">
            <i class="fas fa-users-cog"></i> <span>Usuarios</span>
        </a>

        <a th:href="@{/usuarios/perfil}"><i class="fas fa-user-circle"></i> <span>Mi Perfil</span></a>

        <form th:action="@{/logout}" method="post">
            <button type="submit" class="btn-logout">
                <i class="fas fa-power-off"></i> <span>Cerrar sesión</span>
            </button>
        </form>
    </div>
</nav>

<nav class="top-navbar" th:fragment="topbar">
    <div class="topbar-left">
        <button class="hamburger-btn" id="sidebarOpen">
            <i class="fas fa-bars"></i>
        </button>
    </div>

    <div class="topbar-right">
        <div class="dropdown">
            <a href="#" class="user-profile dropdown-toggle" id="userDropdown" data-bs-toggle="dropdown">
                <!-- MODIFICACIÓN: Muestra el Nombre Real (Ej: Jairo) si está cargado, de lo contrario un fallback -->
                <span class="user-name d-none d-md-inline"
                      th:text="${usuarioLogueado != null ? usuarioLogueado.nombre : 'Usuario'}">Usuario</span>
                <div class="avatar-wrapper"><i class="fas fa-user"></i></div>
            </a>

            <ul class="dropdown-menu shadow">
                <li class="d-md-none">
                    <!-- MODIFICACIÓN: Nombre Real en el menú desplegable móvil -->
                    <div class="user-name-submenu"
                         th:text="${usuarioLogueado != null ? usuarioLogueado.nombre : 'Usuario'}">Nombre Usuario</div>
                    <hr class="dropdown-divider">
                </li>

                <li><a class="dropdown-item" th:href="@{/usuarios/perfil}"><i class="fas fa-user-circle"></i> Mi Perfil</a></li>
                <li><hr class="dropdown-divider"></li>
                <li>
                    <form th:action="@{/logout}" method="post">
                        <button class="dropdown-item text-danger" type="submit">
                            <i class="fas fa-sign-out-alt"></i> Salir
                        </button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>

</body>
</html>
