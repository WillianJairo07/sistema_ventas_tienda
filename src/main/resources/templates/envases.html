<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Envases</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link th:href="@{/css/menu.css}" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/layout :: sidebar}"></div>
<div th:replace="~{fragments/layout :: topbar}"></div>

<main class="content" id="mainContent">
    <div class="container-fluid">
        <div class="row align-items-end mb-4 g-3">
            <div class="col-12 col-xl-4">
                <h2 class="fw-bold text-dynamic mb-1">Gestión de Envases</h2>
                <p class="text-muted-dynamic mb-0 small">Administra aquí el catálogo de envases</p>
            </div>

            <div class="col-12 col-xl-8">
                <div class="d-flex flex-wrap flex-md-nowrap justify-content-xl-end align-items-center gap-2">
                    <div class="search-container custom-search-adaptive">
                        <i class="fas fa-search"></i>
                        <input type="text" id="inputBusqueda" class="form-control shadow-sm" placeholder="Buscar envase..." onkeyup="manejarBusqueda(event)">
                    </div>

                    <div class="btn-group-adaptive d-flex gap-2">
                        <a th:if="${!verInactivos}" th:href="@{/envases(verInactivos=true)}" class="btn btn-ver-inactivos shadow-sm">
                            <i class="fas fa-eye-slash"></i> <span>Inactivos</span>
                        </a>
                        <a th:if="${verInactivos}" th:href="@{/envases(verInactivos=false)}" class="btn btn-ver-activos shadow-sm">
                            <i class="fas fa-eye"></i> <span>Activos</span>
                        </a>
                        <button class="btn btn-new-cat shadow-sm" data-bs-toggle="modal" data-bs-target="#modalEnvase" onclick="nuevoFormulario()">
                            <i class="fas fa-plus-circle"></i> <span>Agregar</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="crud-card shadow-sm overflow-hidden border-0">
            <div class="table-responsive">
                <table class="table custom-table align-middle mb-0" id="tablaEnvases">
                    <thead class="bg-light">
                    <tr class="text-dynamic">
                        <th class="text-center ps-4 py-3" style="font-size: 0.8rem; font-weight: 700;">ID</th>
                        <th class="text-center py-3" style="font-size: 0.8rem; font-weight: 700;">ENVASE</th>
                        <th class="text-center py-3" style="font-size: 0.8rem; font-weight: 700;">GARANTÍA</th>
                        <th class="text-center py-3" style="font-size: 0.8rem; font-weight: 700;">STOCK</th>
                        <th class="text-center py-3" style="font-size: 0.8rem; font-weight: 700;">ACCIONES</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="e : ${envases}" class="border-bottom">
                        <td class="ps-4 fw-bold text-muted text-center" th:text="${e.idEnvase}"></td>
                        <td class="nombre-envase fw-medium text-muted text-center small" th:text="${e.nombre}"></td>
                        <td class="text-center fw-medium text-muted small" th:text="${'S/ ' + e.precioGarantiaBase}"></td>
                        <td class="text-center fw-medium text-muted small" th:text="${e.stock}"></td>
                        <td>
                            <div class="d-flex justify-content-center gap-2">
                                <th:block th:if="${e.estado}">
                                    <button class="btn-circle btn-edit" th:onclick="'editarEnvase(' + ${e.idEnvase} + ')'" data-bs-toggle="modal" data-bs-target="#modalEnvase">
                                        <i class="fas fa-edit"></i>
                                    </button>
                                    <button class="btn-circle btn-delete" th:onclick="'confirmarEliminar(' + ${e.idEnvase} + ')'">
                                        <i class="fas fa-trash-alt"></i>
                                    </button>
                                </th:block>
                                <th:block th:if="${!e.estado}">
                                    <a th:href="@{/envases/restaurar/{id}(id=${e.idEnvase})}" class="btn-circle btn-restore">
                                        <i class="fas fa-trash-restore"></i>
                                    </a>
                                </th:block>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div th:if="${totalPages > 1}" class="d-flex flex-column flex-md-row justify-content-between align-items-center mt-4 px-2 gap-3">
            <div class="text-dark small fw-medium">
                Página <span class="fw-bold text-primary" th:text="${currentPage + 1}"></span> de <span class="fw-bold" th:text="${totalPages}"></span>
            </div>
            <nav>
                <ul class="pagination pagination-sm mb-0">
                    <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                        <a class="page-link shadow-sm" th:href="@{/envases(page=${currentPage - 1}, verInactivos=${verInactivos}, buscar=${buscar})}">
                            <i class="fas fa-chevron-left"></i>
                        </a>
                    </li>

                    <li class="page-item mx-1" th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                        th:if="${(currentPage == 0 and i < 3) or (currentPage == totalPages - 1 and i > totalPages - 4) or (i >= currentPage - 1 and i <= currentPage + 1)}"
                        th:classappend="${i == currentPage} ? 'active'">
                        <a class="page-link shadow-sm" th:href="@{/envases(page=${i}, verInactivos=${verInactivos}, buscar=${buscar})}" th:text="${i + 1}"></a>
                    </li>

                    <li class="page-item" th:classappend="${currentPage + 1 >= totalPages} ? 'disabled'">
                        <a class="page-link shadow-sm" th:href="@{/envases(page=${currentPage + 1}, verInactivos=${verInactivos}, buscar=${buscar})}">
                            <i class="fas fa-chevron-right"></i>
                        </a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>
</main>

<div class="modal fade" id="modalEnvase" tabindex="-1" aria-hidden="true" data-bs-backdrop="static">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg">
            <div class="modal-header border-0">
                <h5 class="modal-title fw-bold text-white" id="modalTitulo"><i class="fas fa-wine-bottle me-2"></i>Nuevo Envase</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <form th:action="@{/envases/guardar}" th:object="${envase}" method="post">
                <div class="modal-body p-4">
                    <input type="hidden" th:field="*{idEnvase}" id="idEnvase">
                    <div class="mb-3">
                        <label class="form-label fw-bold text-dynamic small" style="font-size: 0.9rem;">Nombre del Envase</label>
                        <input type="text" th:field="*{nombre}" id="nombreEnvase" class="form-control" placeholder="Escribe el nombre del envase" required>
                    </div>
                    <div class="mb-2">
                        <label class="form-label fw-bold text-dynamic small" style="font-size: 0.9rem;">Precio Garantía (S/)</label>
                        <input type="number" step="0.01" th:field="*{precioGarantiaBase}" id="precioGarantia" class="form-control" placeholder="Ingresa el precio" required>
                    </div>
                    <div class="mb-2">
                        <label class="form-label fw-bold text-dynamic small" style="font-size: 0.9rem;">Stock Actual</label>
                        <input type="number" th:field="*{stock}" id="stockEnvase" class="form-control">
                    </div>
                </div>
                <div class="modal-footer border-0 p-4 pt-0">
                    <button type="button" class="btn btn-secondary-custom px-4" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-new-cat px-4"><i class="fas fa-save me-2"></i>Guardar</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/menu.js}"></script>
<script th:inline="javascript">
    document.addEventListener("DOMContentLoaded", function() {
        // Variables de mensaje desde el controlador (Spring Boot)
        const successMsg = /*[[${success}]]*/ null;
        const errorMsg = /*[[${error}]]*/ null;

        // --- ALERTAS: ÉXITO ---
        if (successMsg) {
            Swal.fire({
                icon: 'success',
                title: '¡Hecho!',
                text: successMsg,
                timer: 2000,
                showConfirmButton: false,
                background: '#ffffff',
                color: '#1b254b',
                iconColor: '#3b82f6',
                customClass: { popup: 'border-radius-15' }
            });
        }

        // --- ALERTAS: ERROR ---
        if (errorMsg) {
            Swal.fire({
                icon: 'error',
                title: 'Atención',
                text: errorMsg,
                background: '#ffffff',
                color: '#1b254b',
                confirmButtonColor: '#3b82f6',
                iconColor: '#ee5d5d'
            });
        }

        // --- BÚSQUEDA: MANTENER FOCO ---
        const inputBusqueda = document.getElementById("inputBusqueda");
        if (inputBusqueda && inputBusqueda.value !== "") {
            inputBusqueda.focus();
            const val = inputBusqueda.value;
            inputBusqueda.value = '';
            inputBusqueda.value = val;
        }
    });

    function manejarBusqueda(event) {
        const input = document.getElementById("inputBusqueda");
        const texto = input.value.toLowerCase();

        if (event.key === 'Enter') {
            const urlParams = new URLSearchParams(window.location.search);
            const verInactivos = urlParams.get('verInactivos') || 'false';
            window.location.href = `/envases?page=0&verInactivos=${verInactivos}&buscar=${encodeURIComponent(texto)}`;
            return;
        }

        const filas = document.querySelectorAll("#tablaEnvases tbody tr");
        filas.forEach(fila => {
            const nombre = fila.querySelector(".nombre-envase")?.innerText.toLowerCase() || "";
            const id = fila.querySelector("td:first-child")?.innerText.toLowerCase() || "";
            fila.style.display = (nombre.includes(texto) || id.includes(texto)) ? "" : "none";
        });
    }

    function nuevoFormulario() {
        const titulo = document.getElementById('modalTitulo');
        const idInput = document.getElementById('idEnvase');
        const nombreInput = document.getElementById('nombreEnvase');
        const precioInput = document.getElementById('precioGarantia');
        const stockInput = document.getElementById('stockEnvase'); // <--- AGREGA ESTO

        titulo.innerHTML = '<i class="fas fa-plus-circle me-2"></i>Nuevo Envase';

        idInput.value = '';
        nombreInput.value = '';
        precioInput.value = '';
        stockInput.value = '0'; // <--- Lo ponemos en 0 por defecto para un envase nuevo
        stockInput.readOnly = false;
        stockInput.style.backgroundColor = "#ffffff";
    }

    function editarEnvase(id) {
        document.getElementById('modalTitulo').innerHTML = '<i class="fas fa-edit me-2"></i>Editar Envase';

        fetch('/envases/editar/' + id)
            .then(res => res.json())
            .then(data => {
                document.getElementById('idEnvase').value = data.idEnvase;
                document.getElementById('nombreEnvase').value = data.nombre;
                document.getElementById('precioGarantia').value = data.precioGarantiaBase;

                // Ahora este campo sí recibirá el valor y será editable
                const stockInput = document.getElementById('stockEnvase');
                stockInput.value = data.stock;

                stockInput.readOnly = true; // Bloquea el campo para que NO se pueda editar
                stockInput.style.backgroundColor = "#e9ecef";
            })
            .catch(err => {
                console.error("Error:", err);
            });
    }

    function confirmarEliminar(id) {
        Swal.fire({
            title: '¿Eliminar envase?',
            text: "El envase se moverá a la lista de inactivos.",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#3b82f6',
            cancelButtonColor: '#64748b',
            confirmButtonText: 'Sí, mover',
            cancelButtonText: 'Cancelar',
            background: '#ffffff',
            color: '#1b254b'
        }).then((result) => {
            if (result.isConfirmed) {
                window.location.href = "/envases/eliminar/" + id;
            }
        });
    }
</script>
</body>
</html>
