<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Productos - Sistema de Ventas</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

    <script th:src="@{/js/tema.js}"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link th:href="@{/css/menu.css}" rel="stylesheet">
    <link th:href="@{/css/menu1.css}" rel="stylesheet">
    <link th:href="@{/css/modal.css}" rel="stylesheet">
    <style>

        html.light-mode .btn-toggle-lotes i {
            color: black;
        }

        /* Tema oscuro */
        html.dark-mode .btn-toggle-lotes i {
            color: white;
        }


        .btn-toggle-lotes i {
            transition: transform 0.2s ease, color 0.2s ease;
        }

        .btn-toggle-lotes:focus,
        .btn-toggle-lotes:active,
        .btn-toggle-lotes:focus-visible {
            outline: none !important;
            box-shadow: none !important;
            border-color: transparent !important;
        }

        .lote-detalle-container {
            background-color: #f9f9f9;
        }


        html.dark-mode .lote-detalle-container {
            background-color: #2b2e32;
        }

        html.dark-mode .table-lotes-custom {
            color: #ffffff !important;
            border-color: #444;
        }

        html.dark-mode .table-lotes-custom thead th {
            color: #ffffff;
            background-color: #343a40;
        }


        .custom-table tbody tr:hover {
            background-color: transparent !important;
            color: inherit !important;
        }


        html.dark-mode .custom-table tbody tr:hover {
            background-color: transparent !important;
            color: inherit !important;
        }

        .table-lotes-custom tbody tr:hover {
            background-color: transparent !important;
        }


    </style>
</head>
<body>

<!-- Sidebar -->
<div th:replace="~{fragments/layout :: sidebar}"></div>

<!-- Topbar -->
<div th:replace="~{fragments/layout :: topbar}"></div>

<main class="content" id="mainContent">
    <div class="container-fluid">
        <div class="header-container d-flex flex-column justify-content-between align-items-start mb-4 gap-3">
            <div class="header-text text-start">
                <h2 class="fw-bold text-dynamic mb-1">Gestión de Productos</h2>
                <p class="text-muted-dynamic mb-0 small">Administra aquí todos tus productos</p>
            </div>

            <div class="controles-wrapper d-flex align-items-center w-100 gap-3">
                <div class="search-container custom-search-adaptive flex-grow-1">
                    <input type="text" id="inputBusqueda" class="form-control"
                           th:value="${buscar}"
                           placeholder="Busca por nombre o código..."
                           onkeyup="manejarBusqueda(event)">
                    <i class="fas fa-search"></i>
                </div>

                <div class="btn-group-adaptive d-flex flex-nowrap gap-2">
                    <a th:if="${!verInactivos}" th:href="@{/productos(verInactivos=true, buscar=${buscar})}" class="btn btn-ver-inactivos shadow-sm">
                        <i class="fas fa-eye-slash"></i> <span>Ver Inactivos</span>
                    </a>
                    <a th:if="${verInactivos}" th:href="@{/productos(verInactivos=false, buscar=${buscar})}" class="btn btn-ver-activos shadow-sm">
                        <i class="fas fa-eye"></i> <span>Ver Activos</span>
                    </a>
                    <button class="btn btn-new-cat shadow-sm" data-bs-toggle="modal" data-bs-target="#modalProducto" onclick="nuevoFormulario()">
                        <i class="fas fa-plus-circle"></i> <span>Agregar</span>
                    </button>
                </div>
            </div>
        </div>

        <div class="crud-card p-4 shadow">
            <div class="table-responsive">
                <table class="table custom-table align-middle" id="tablaProductos">
                    <thead>
                    <tr class="text-dynamic">
                        <th style="width: 50px;"></th>
                        <th class="ps-4">ID</th>
                        <th>CÓDIGO</th>
                        <th>PRODUCTO</th>
                        <th>CATEGORÍA</th>
                        <th>PRECIO VENTA</th>
                        <th>STOCK/PESO TOTAL</th>
                        <th class="text-center">ACCIONES</th>
                    </tr>
                    </thead>
                    <tbody>
                    <th:block th:each="p : ${productos}" th:if="${p != null}">
                        <tr class="producto-fila">
                            <td>
                                <button class="btn btn-sm btn-toggle-lotes" type="button"
                                        th:onclick="|toggleLotes('lotes-${p.idProducto}', this)|">
                                    <i class="fas fa-chevron-right" style="transition: transform 0.3s;"></i>
                                </button>
                            </td>
                            <td class="ps-4 fw-bold text-neon" th:text="${p.idProducto}"></td>
                            <td th:text="${p.codigoBarras} ?: 'SIN CÓDIGO'" class="text-muted small td-codigo"></td>
                            <td class="nombre-prod text-dynamic fw-semibold" th:text="${p.nombreProducto}"></td>
                            <td>
                                <span class="badge-categoria-tag"
                                      th:text="${p.categoria != null ? p.categoria.nombreCategoria : 'SIN CATEGORÍA'}">
                                </span>
                            </td>
                            <td class="fw-bold text-dynamic" th:text="${p.precio != null} ? 'S/ ' + ${#numbers.formatDecimal(p.precio, 1, 2)} : 'S/ 0.00'"></td>
                            <td>
                                <div th:with="esKilo=${p.unidadMedida == 'KG'}">
                                    <span th:if="${p.stock == 0}" class="badge-stock bg-secondary text-white">Agotado</span>
                                    <span th:if="${p.stock > 0}"
                                          th:class="${p.stock <= 5} ? 'badge-stock bg-danger text-white' : 'badge-stock bg-success text-white'">
                                        <span th:text="${esKilo ? #numbers.formatDecimal(p.stock, 1, 3) : #numbers.formatInteger(p.stock, 1)}"></span>
                                        <small th:text="${p.unidadMedida}"></small>
                                    </span>
                                </div>
                            </td>
                            <td class="text-center">
                                <div class="d-flex justify-content-center gap-2">
                                    <th:block th:if="${p.estado}">
                                        <button class="btn-circle btn-edit" th:onclick="'editarProducto(' + ${p.idProducto} + ')'" data-bs-toggle="modal" data-bs-target="#modalProducto">
                                            <i class="fas fa-edit"></i>
                                        </button>
                                        <button class="btn-circle btn-delete" th:onclick="'confirmarEliminar(' + ${p.idProducto} + ')'">
                                            <i class="fas fa-trash-alt"></i>
                                        </button>
                                    </th:block>
                                    <th:block th:if="${!p.estado}">
                                        <a th:href="@{/productos/restaurar/{id}(id=${p.idProducto})}" class="btn-circle btn-restore" title="Restaurar">
                                            <i class="fas fa-trash-restore"></i>
                                        </a>
                                    </th:block>
                                </div>
                            </td>
                        </tr>
                        <tr th:id="'lotes-' + ${p.idProducto}" class="lotes-fila" style="display:none;">
                            <td colspan="8" class="p-0 border-0">
                                <div class="p-3 lote-detalle-container" style="background: rgba(0,0,0,0.02);">
                                    <table class="table table-sm table-bordered mb-0">
                                        <thead class="table-light">
                                        <tr>
                                            <th>N° Lote</th>
                                            <th>Cant. Inicial</th>
                                            <th>Precio Compra</th>
                                            <th>Stock Actual</th>
                                        </tr>
                                        </thead>
                                        <tbody>
                                        <tr th:each="lote : ${p.detallesCompra}" th:if="${lote != null and lote.stockActual > 0}">
                                            <td th:text="${lote.idDetalleCompra}"></td>
                                            <td th:text="${p.unidadMedida == 'KG' ? #numbers.formatDecimal(lote.cantidad, 1, 3) : #numbers.formatInteger(lote.cantidad, 1)}"></td>
                                            <td th:text="'S/ ' + ${#numbers.formatDecimal(lote.precioCompra, 1, 2)}"></td>
                                            <td class="fw-bold text-success" th:text="${p.unidadMedida == 'KG' ? #numbers.formatDecimal(lote.stockActual, 1, 3) : #numbers.formatInteger(lote.stockActual, 1)}"></td>
                                        </tr>
                                        </tbody>
                                    </table>
                                </div>
                            </td>
                        </tr>
                    </th:block>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="d-flex justify-content-between align-items-center mt-3 px-2" th:if="${totalPages > 1}">
            <div class="text-muted-dynamic small">
                Página <span class="fw-bold" th:text="${currentPage + 1}"></span> de <span th:text="${totalPages}"></span>
            </div>
            <nav>
                <ul class="pagination pagination-sm mb-0">
                    <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                        <a class="page-link shadow-sm" th:href="@{/productos(page=${currentPage - 1}, verInactivos=${verInactivos}, buscar=${buscar})}">
                            <i class="fas fa-chevron-left"></i>
                        </a>
                    </li>
                    <li class="page-item mx-1" th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                        th:if="${i >= currentPage - 1 and i <= currentPage + 1}"
                        th:classappend="${i == currentPage} ? 'active'">
                        <a class="page-link shadow-sm" th:href="@{/productos(page=${i}, verInactivos=${verInactivos}, buscar=${buscar})}" th:text="${i + 1}"></a>
                    </li>
                    <li class="page-item" th:classappend="${currentPage + 1 >= totalPages} ? 'disabled'">
                        <a class="page-link shadow-sm" th:href="@{/productos(page=${currentPage + 1}, verInactivos=${verInactivos}, buscar=${buscar})}">
                            <i class="fas fa-chevron-right"></i>
                        </a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>
</main>
<div class="modal fade" id="modalProducto" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg" style="border-radius: 15px;">
            <div class="modal-header border-0 p-4" style="background: linear-gradient(45deg, #4b6cb7, #182848); border-radius: 15px 15px 0 0;">
                <h5 class="modal-title fw-bold text-white" id="modalTitulo">Nuevo Producto</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <form th:action="@{/productos/guardar}" th:object="${producto}" method="post">
                <div class="modal-body p-4">
                    <input type="hidden" th:field="*{idProducto}" id="idProducto">

                    <div class="mb-3">
                        <label class="form-label fw-bold text-dynamic">Código de Barras</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-barcode"></i></span>
                            <input type="text" th:field="*{codigoBarras}" id="codigoBarras"
                                   class="form-control" placeholder="Escanee el código aquí..." required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold text-dynamic">Nombre del Producto</label>
                        <input type="text" th:field="*{nombreProducto}" id="nombreProducto" class="form-control" placeholder="Ej: Arroz 1kilo" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold text-dynamic">Unidad de Medida</label>
                        <select th:field="*{unidadMedida}" id="unidadMedida" class="form-select" required>
                            <option value="UNIDAD">Unidad</option>
                            <option value="KG">Kilogramos</option>
                        </select>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold text-dynamic">Precio (S/)</label>
                            <input type="number" step="0.01" min="0.01" th:field="*{precio}" id="precio" class="form-control" placeholder="0.00" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold text-dynamic">Stock actual</label>
                            <input type="number" step="0.001" min="0" th:field="*{stock}" id="stock"
                                   class="form-control" placeholder="0.000" required>
                            <small id="stockHelp" class="text-muted" style="display:none; font-size: 0.7rem; color: #ffc107 !important;">
                                * El stock se actualiza automáticamente mediante Compras.
                            </small>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold text-dynamic">Categoría</label>
                        <select th:field="*{categoria.idCategoria}" id="categoriaSelect" class="form-select" required>
                            <option value="" disabled selected>Seleccione una categoría</option>
                            <option th:each="cat : ${categorias}" th:value="${cat.idCategoria}" th:text="${cat.nombreCategoria}"></option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer border-0 p-4 pt-0">
                    <button type="button" class="btn btn-secondary px-4" data-bs-dismiss="modal">Cerrar</button>
                    <button type="submit" class="btn btn-new-cat px-4">Guardar Cambios</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/menu.js}"></script>
<script th:inline="javascript">
    // --- VARIABLES GLOBALES DE ESTADO ---
    const CURRENT_VER_INACTIVOS = /*[[${verInactivos}]]*/ false;
    const CURRENT_BUSQUEDA = /*[[${buscar}]]*/ '';

    document.addEventListener("DOMContentLoaded", function() {
        const successMsg = /*[[${success}]]*/ null;
        const errorMsg = /*[[${error}]]*/ null;
        const isDark = document.body.classList.contains('dark-mode');

        const swalBase = {
            background: isDark ? '#1a1d21' : '#fff',
            color: isDark ? '#fff' : '#000'
        };

        if (successMsg) {
            Swal.fire({
                ...swalBase,
                icon: 'success',
                title: '¡Logrado!',
                text: successMsg,
                timer: 2000,
                showConfirmButton: false
            });
        }

        if (errorMsg) {
            Swal.fire({
                ...swalBase,
                icon: 'error',
                title: 'Atención',
                text: errorMsg,
                confirmButtonColor: '#ff4d4d'
            });
        }

        // Manejo de tema
        const temaActual = localStorage.getItem('tema-seleccionado') || 'dark-mode';
        const darkRadio = document.getElementById('darkMode');
        const lightRadio = document.getElementById('lightMode');
        if (temaActual === 'dark-mode' && darkRadio) darkRadio.checked = true;
        else if (lightRadio) lightRadio.checked = true;
    });

    // --- NUEVA LÓGICA DE BÚSQUEDA HÍBRIDA ---
    function manejarBusqueda(event) {
        const texto = document.getElementById("inputBusqueda").value.toLowerCase();

        // 1. SI PRESIONA ENTER: Búsqueda profunda en Servidor (Spring Boot)
        if (event.key === 'Enter') {
            window.location.href = `/productos?buscar=${encodeURIComponent(texto)}&verInactivos=${CURRENT_VER_INACTIVOS}`;
            return;
        }

        // 2. MIENTRAS ESCRIBE: Filtro visual instantáneo (Frontend)
        const filasProducto = document.querySelectorAll(".producto-fila");

        filasProducto.forEach(fila => {
            const nombre = fila.querySelector(".nombre-prod")?.innerText.toLowerCase() || "";
            const codigo = fila.querySelector(".td-codigo")?.innerText.toLowerCase() || "";
            const categoria = fila.querySelector(".badge-categoria-tag")?.innerText.toLowerCase() || "";
            const id = fila.querySelector(".text-neon")?.innerText.toLowerCase() || "";

            if (nombre.includes(texto) || codigo.includes(texto) || categoria.includes(texto) || id.includes(texto)) {
                fila.style.display = "";
            } else {
                fila.style.display = "none";

                // Si ocultamos el producto, también ocultamos su fila de lotes si estaba expandida
                const idLoteFila = fila.querySelector(".btn-toggle-lotes")
                    ?.getAttribute("onclick")
                    ?.match(/'([^']+)'/)?.[1];
                if(idLoteFila) {
                    const loteFila = document.getElementById(idLoteFila);
                    if(loteFila) loteFila.style.display = "none";
                    const icono = fila.querySelector(".btn-toggle-lotes i");
                    if(icono) icono.style.transform = 'rotate(0deg)';
                }
            }
        });
    }

    // --- FUNCIONES DE FORMULARIO Y EDICIÓN ---
    function nuevoFormulario() {
        document.getElementById('modalTitulo').innerText = 'Nuevo Producto';
        document.getElementById('idProducto').value = '';
        document.getElementById('codigoBarras').value = '';
        document.getElementById('nombreProducto').value = '';
        document.getElementById('precio').value = '';
        document.getElementById('stock').value = '';
        document.getElementById('categoriaSelect').value = '';
        document.getElementById('unidadMedida').value = 'UNIDAD';

        document.getElementById('stock').readOnly = false;
        document.getElementById('stockHelp').style.display = 'none';

        setTimeout(() => { document.getElementById('codigoBarras').focus(); }, 450);
    }

    function editarProducto(id) {
        document.getElementById('modalTitulo').innerText = 'Editar Producto';
        fetch(`/productos/editar/${id}`)
            .then(res => res.json())
            .then(data => {
                document.getElementById('idProducto').value = data.idProducto;
                document.getElementById('codigoBarras').value = data.codigoBarras || '';
                document.getElementById('nombreProducto').value = data.nombreProducto;
                document.getElementById('precio').value = data.precio;
                document.getElementById('stock').value = data.stock;

                if(data.unidadMedida) document.getElementById('unidadMedida').value = data.unidadMedida;
                if(data.categoria) document.getElementById('categoriaSelect').value = data.categoria.idCategoria;

                document.getElementById('stock').readOnly = true;
                document.getElementById('stockHelp').style.display = 'block';
            })
            .catch(err => console.error('Error:', err));
    }

    // --- ACCIONES DE ELIMINAR / RESTAURAR ---
    function confirmarEliminar(id) {
        const isDark = document.body.classList.contains('dark-mode');
        Swal.fire({
            title: '¿Eliminar producto?',
            text: "El producto se moverá a la lista de inactivos.",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#ff4d4d',
            cancelButtonColor: '#6c757d',
            confirmButtonText: 'Sí, eliminar',
            cancelButtonText: 'Cancelar',
            background: isDark ? '#1a1d21' : '#fff',
            color: isDark ? '#fff' : '#000'
        }).then((result) => {
            if (result.isConfirmed) {
                // Redirigimos respetando el estado de la búsqueda y filtros
                window.location.href = `/productos/eliminar/${id}?verInactivos=${CURRENT_VER_INACTIVOS}&buscar=${encodeURIComponent(CURRENT_BUSQUEDA)}`;
            }
        });
    }

    // --- MANEJO DE LOTES Y TABLAS ---
    function toggleLotes(idFila, btn) {
        const fila = document.getElementById(idFila);
        if (!fila) return;

        const icono = btn.querySelector('i');
        if (fila.style.display === 'none' || fila.style.display === '') {
            fila.style.display = 'table-row';
            if (icono) icono.style.transform = 'rotate(90deg)';
        } else {
            fila.style.display = 'none';
            if (icono) icono.style.transform = 'rotate(0deg)';
        }
    }

    function toggleAgotados(btn) {
        const tbody = btn.closest('tbody');
        const filasAgotadas = tbody.querySelectorAll('.agotado-row');
        filasAgotadas.forEach(fila => {
            fila.style.display = (fila.style.display === 'none') ? '' : 'none';
        });
    }
</script>

</body>
</html>
