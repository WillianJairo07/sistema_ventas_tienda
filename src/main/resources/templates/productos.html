<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Productos - Sistema de Ventas</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link th:href="@{/css/menu.css}" rel="stylesheet">
</head>
<body>

<!-- Sidebar -->
<div th:replace="~{fragments/layout :: sidebar}"></div>

<!-- Topbar -->
<div th:replace="~{fragments/layout :: topbar}"></div>

<main class="content" id="mainContent">
    <div class="container-fluid">
        <!-- CABECERA -->
        <div class="row align-items-end mb-4 g-3">
            <div class="col-12 col-xl-4">
                <h2 class="fw-bold text-dynamic mb-1">Gestión de Productos</h2>
                <p class="text-muted-dynamic mb-0 small">Administra el inventario y stock de tus productos</p>
            </div>

            <div class="col-12 col-xl-8">
                <div class="d-flex flex-wrap flex-md-nowrap justify-content-xl-end align-items-center gap-2">
                    <div class="search-container custom-search-adaptive">
                        <i class="fas fa-search"></i>
                        <input type="text" id="inputBusqueda" class="form-control shadow-sm"
                               th:value="${buscar}" placeholder="Buscar por nombre o código..." onkeyup="manejarBusqueda(event)">
                    </div>

                    <div class="btn-group-adaptive d-flex gap-2">
                        <a th:if="${!verInactivos}" th:href="@{/productos(verInactivos=true, buscar=${buscar})}" class="btn btn-ver-inactivos shadow-sm">
                            <i class="fas fa-eye-slash"></i> <span>Inactivos</span>
                        </a>
                        <a th:if="${verInactivos}" th:href="@{/productos(verInactivos=false, buscar=${buscar})}" class="btn btn-ver-activos shadow-sm">
                            <i class="fas fa-eye"></i> <span>Activos</span>
                        </a>
                        <button class="btn btn-new-cat shadow-sm" data-bs-toggle="modal" data-bs-target="#modalProducto" onclick="nuevoFormulario()">
                            <i class="fas fa-plus-circle"></i> <span>Agregar</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- TABLA DE PRODUCTOS -->
        <div class="crud-card shadow-sm overflow-hidden border-0">
            <div class="table-responsive">
                <table class="table custom-table align-middle mb-0" id="tablaProductos">
                    <thead class="bg-light">
                    <tr class="text-dynamic">
                        <th style="width: 40px;"></th>
                        <th class="text-center py-3" style="font-size: 0.75rem; font-weight: 700;">ID</th>
                        <th class="text-center py-3" style="font-size: 0.75rem; font-weight: 700; min-width: 100px;">CÓDIGO</th>
                        <th class="text-center py-3" style="font-size: 0.75rem; font-weight: 700; min-width: 150px;">PRODUCTO</th>
                        <th class="text-center py-3" style="font-size: 0.75rem; font-weight: 700;">CATEGORÍA</th>
                        <th class="text-center py-3 text-nowrap" style="font-size: 0.75rem; font-weight: 700; min-width: 110px;">PRECIO VENTA</th>
                        <th class="text-center py-3" style="font-size: 0.75rem; font-weight: 700;">STOCK</th>
                        <th class="text-center py-3" style="font-size: 0.75rem; font-weight: 700;">ACCIONES</th>
                    </tr>
                    </thead>
                    <tbody>
                    <th:block th:each="p : ${productos}" th:if="${p != null}">
                        <tr class="border-bottom">
                            <td class="text-center">
                                <button class="btn btn-sm p-0 shadow-none border-0" type="button"
                                        th:onclick="|toggleLotes('lotes-${p.idProducto}', this)|"
                                        style="background: transparent; outline: none; box-shadow: none;">
                                    <i class="fas fa-chevron-right text-muted" style="transition: transform 0.3s;"></i>
                                </button>
                            </td>
                            <td class="fw-bold text-muted text-center small" th:text="${p.idProducto}"></td>
                            <td class="text-center small text-muted px-2">
                                <code class="text-muted" style="font-size: 0.8rem;" th:text="${p.codigoBarras} ?: '---'"></code>
                            </td>
                            <td class="fw-medium text-muted text-center px-2 ">
                                <span class="nombre-prod" style="font-size: 0.9rem;" th:text="${p.nombreProducto}"></span>
                            </td>
                            <td class="text-center">
                                <span class="badge rounded-pill bg-light text-dark border px-3 fw-medium" style="font-size: 0.85rem;"
                                      th:text="${p.categoria != null ? p.categoria.nombreCategoria : 'SIN CATEGORÍA'}">
                                </span>
                            </td>
                            <td class="fw-bold text-dynamic text-center text-nowrap px-2" style="font-size: 0.9rem;"
                                th:text="${p.precio != null} ? 'S/ ' + ${#numbers.formatDecimal(p.precio, 1, 2)} : 'S/ 0.00'"></td>
                            <td class="text-center" style="font-size: 1.1rem;">
                                <div th:with="esKilo=${p.unidadMedida == 'KG'}" >
                                    <span th:if="${p.stock == 0}" class="badge badge-agotado">Agotado</span>
                                    <span th:if="${p.stock > 0}"
                                          th:class="${p.stock <= 5} ? 'badge bg-danger' : 'badge badge-disponible'">
                                            <span th:text="${esKilo ? #numbers.formatDecimal(p.stock, 1, 3) : #numbers.formatInteger(p.stock, 1)}"></span>
                                            <small th:text="${p.unidadMedida}"></small>
                                    </span>
                                </div>
                            </td>
                            <td>
                                <div class="d-flex justify-content-center gap-2">
                                    <th:block th:if="${p.estado}">
                                        <button class="btn-circle btn-edit"
                                                th:onclick="'abrirModalEditar(' + ${p.idProducto} + ')'">
                                            <i class="fas fa-edit"></i>
                                        </button>
                                        <button class="btn-circle btn-delete" th:onclick="'confirmarEliminar(' + ${p.idProducto} + ')'">
                                            <i class="fas fa-trash-alt"></i>
                                        </button>
                                    </th:block>
                                    <th:block th:if="${!p.estado}">
                                        <a th:href="@{/productos/restaurar/{id}(id=${p.idProducto})}" class="btn-circle btn-restore">
                                            <i class="fas fa-trash-restore"></i>
                                        </a>
                                    </th:block>
                                </div>
                            </td>
                        </tr>
                        <!-- FILA DE LOTES -->
                        <tr th:id="'lotes-' + ${p.idProducto}" style="display:none; background-color: #f8fafc;">
                            <td colspan="8" class="p-3">
                                <div class="historial-container"></div>
                            </td>
                        </tr>
                    </th:block>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- PAGINACIÓN DE PRODUCTOS -->
        <div th:if="${totalPages > 1}" class="d-flex flex-column flex-md-row justify-content-between align-items-center mt-4 px-2 gap-3">
            <div class="text-dark small fw-medium">
                Página <span class="fw-bold text-primary" th:text="${currentPage + 1}"></span> de <span class="fw-bold" th:text="${totalPages}"></span>
            </div>
            <nav>
                <ul class="pagination pagination-sm mb-0">
                    <!-- Botón Anterior -->
                    <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                        <a class="page-link shadow-sm" th:href="@{/productos(page=${currentPage - 1}, verInactivos=${verInactivos}, buscar=${buscar})}">
                            <i class="fas fa-chevron-left"></i>
                        </a>
                    </li>

                    <!-- Números de Página -->
                    <li class="page-item mx-1" th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                        th:classappend="${i == currentPage} ? 'active'">
                        <a class="page-link shadow-sm" th:href="@{/productos(page=${i}, verInactivos=${verInactivos}, buscar=${buscar})}" th:text="${i + 1}"></a>
                    </li>

                    <!-- Botón Siguiente -->
                    <li class="page-item" th:classappend="${currentPage + 1 == totalPages} ? 'disabled'">
                        <a class="page-link shadow-sm" th:href="@{/productos(page=${currentPage + 1}, verInactivos=${verInactivos}, buscar=${buscar})}">
                            <i class="fas fa-chevron-right"></i>
                        </a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>
</main>

<div class="modal fade" id="modalProducto" tabindex="-1" data-bs-backdrop="static">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg">
            <div class="modal-header border-0">
                <h5 class="modal-title fw-bold text-white" id="modalTitulo">
                    <i class="fas fa-plus-circle me-2"></i>Nuevo Producto
                </h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>

            <form th:action="@{/productos/guardar}" th:object="${producto}" method="post">
                <div class="modal-body p-4">
                    <input type="hidden" th:field="*{idProducto}" id="idProducto">

                    <div class="mb-3">
                        <label class="form-label fw-bold text-dynamic mb-1" style="font-size: 0.9rem;">Código de Barras</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0" style="border: 1px solid #dee2e6; border-radius: 10px 0 0 10px;">
                                <i class="fas fa-barcode text-muted"></i>
                            </span>
                            <input type="text" th:field="*{codigoBarras}" id="codigoBarras"
                                   class="form-control shadow-none border-start-0"
                                   placeholder="Escriba el código..." required
                                   style="height: 42px; font-size: 0.9rem; border: 1px solid #dee2e6; border-radius: 0 10px 10px 0;">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold text-dynamic mb-1" style="font-size: 0.9rem;">Nombre del Producto</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0" style="border: 1px solid #dee2e6; border-radius: 10px 0 0 10px;">
                                <i class="fas fa-tag text-muted"></i>
                            </span>
                            <input type="text" th:field="*{nombreProducto}" id="nombreProducto"
                                   class="form-control shadow-none border-start-0"
                                   placeholder="Ej: Arroz Costeño" required
                                   style="height: 42px; font-size: 0.9rem; border: 1px solid #dee2e6; border-radius: 0 10px 10px 0;">
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold text-dynamic mb-1" style="font-size: 0.9rem;">U. Medida</label>
                            <select th:field="*{unidadMedida}" class="form-select shadow-none"
                                    style="height: 42px; border-radius: 10px; font-size: 0.9rem; border: 1px solid #dee2e6;">
                                <option value="UNIDAD">Unidad</option>
                                <option value="KG">Kilogramos (KG)</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold text-dynamic mb-1" style="font-size: 0.9rem;">Categoría</label>
                            <select name="categoria.idCategoria" id="categoriaSelect" class="form-select shadow-none"
                                    style="height: 42px; border-radius: 10px; font-size: 0.9rem; border: 1px solid #dee2e6;">
                                <option value="" disabled selected>Seleccione una categoría...</option>
                                <option th:each="cat : ${categorias}"
                                        th:value="${cat.idCategoria}"
                                        th:text="${cat.nombreCategoria}"></option>
                            </select>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold text-dynamic mb-1" style="font-size: 0.9rem;">Precio Venta (S/)</label>
                            <input type="number" step="0.01" th:field="*{precio}"
                                   class="form-control shadow-none" placeholder="0.00" required
                                   style="height: 42px; border-radius: 10px; font-size: 0.9rem; border: 1px solid #dee2e6;">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold text-dynamic mb-1" style="font-size: 0.9rem;">Stock Actual</label>
                            <input type="number" step="0.001" th:field="*{stock}"
                                   class="form-control shadow-none" placeholder="0.000" required
                                   style="height: 42px; border-radius: 10px; font-size: 0.9rem; border: 1px solid #dee2e6;">
                        </div>
                    </div>
                </div>

                <div class="modal-footer border-0 p-4 pt-0">
                    <button type="button" class="btn btn-secondary-custom px-4" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-new-cat px-4">
                        <i class="fas fa-save me-2"></i>Guardar Cambios
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/menu.js}"></script>
<script th:inline="javascript">
    // --- VARIABLES GLOBALES DE ESTADO ---
    const CURRENT_VER_INACTIVOS = /*[[${verInactivos}]]*/ false;
    const CURRENT_BUSQUEDA = /*[[${buscar}]]*/ '';

    document.addEventListener("DOMContentLoaded", function() {
        const successMsg = /*[[${success}]]*/ null;
        const errorMsg = /*[[${error}]]*/ null;

        // ALERTAS UNIFICADAS (Estilo Categorías)
        if (successMsg) {
            Swal.fire({
                icon: 'success',
                title: '¡Hecho!',
                text: successMsg,
                timer: 2000,
                showConfirmButton: false,
                background: '#ffffff',
                color: '#1b254b',
                iconColor: '#3b82f6',
                customClass: {
                    popup: 'border-radius-15'
                }
            });
        }

        if (errorMsg) {
            Swal.fire({
                icon: 'error',
                title: 'Atención',
                text: errorMsg,
                background: '#ffffff',
                color: '#1b254b',
                confirmButtonColor: '#3b82f6',
                iconColor: '#ee5d5d',
                customClass: {
                    popup: 'border-radius-15'
                }
            });
        }
    });

    // --- ACCIONES DE ELIMINAR / RESTAURAR (Colores Unificados) ---
    function confirmarEliminar(id) {
        Swal.fire({
            title: '¿Eliminar producto?',
            text: "El producto se moverá a la lista de inactivos.",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#3b82f6', // Azul corporativo
            cancelButtonColor: '#64748b',   // Gris neutro
            confirmButtonText: 'Sí, mover',
            cancelButtonText: 'Cancelar',
            background: '#ffffff',
            color: '#1b254b',
            customClass: {
                popup: 'border-radius-15'
            }
        }).then((result) => {
            if (result.isConfirmed) {
                window.location.href = `/productos/eliminar/${id}?verInactivos=${CURRENT_VER_INACTIVOS}&buscar=${encodeURIComponent(CURRENT_BUSQUEDA)}`;
            }
        });
    }

    // --- LÓGICA DE BÚSQUEDA HÍBRIDA ---
    function manejarBusqueda(event) {
        const texto = document.getElementById("inputBusqueda").value.toLowerCase();

        if (event.key === 'Enter') {
            window.location.href = `/productos?page=0&buscar=${encodeURIComponent(texto)}&verInactivos=${CURRENT_VER_INACTIVOS}`;
            return;
        }

        const filas = document.querySelectorAll("#tablaProductos tbody tr");
        filas.forEach(fila => {
            if (fila.id.startsWith('lotes-')) return;
            const celdas = fila.getElementsByTagName("td");

            if (celdas.length >= 4) {
                const codigo = celdas[2].textContent.toLowerCase();
                const nombre = celdas[3].textContent.toLowerCase();

                if (nombre.includes(texto) || codigo.includes(texto)) {
                    fila.style.display = "";
                } else {
                    fila.style.display = "none";
                    const idLoteFila = fila.querySelector('button[onclick*="toggleLotes"]')
                        ?.getAttribute("onclick")
                        ?.match(/'([^']+)'/)?.[1];
                    if (idLoteFila) {
                        const loteFila = document.getElementById(idLoteFila);
                        if (loteFila) loteFila.style.display = "none";
                    }
                }
            }
        });
    }

    // --- FUNCIONES DE FORMULARIO ---
    function nuevoFormulario() {
        document.getElementById('modalTitulo').innerHTML = '<i class="fas fa-plus-circle me-2"></i>Nuevo Producto';
        document.getElementById('idProducto').value = '';
        document.getElementById('codigoBarras').value = '';
        document.getElementById('nombreProducto').value = '';
        document.getElementById('precio').value = '';
        document.getElementById('stock').value = '';
        document.getElementById('categoriaSelect').value = '';
        document.getElementById('unidadMedida').value = 'UNIDAD';

        // Desbloqueamos el stock para productos nuevos
        const stockInput = document.getElementById('stock');
        if (stockInput) stockInput.readOnly = false;

        // VALIDACIÓN SEGURA: Solo intentamos acceder a 'style' si el elemento realmente existe
        const stockHelp = document.getElementById('stockHelp');
        if (stockHelp) {
            stockHelp.style.display = 'none';
        }


    }

    function editarProducto(id) {
        const titulo = document.getElementById('modalTitulo');
        if (titulo) titulo.innerHTML = '<i class="fas fa-edit me-2"></i>Editar Producto';

        fetch(`/productos/editar/${id}`)
            .then(res => res.json())
            .then(data => {
                // Asignación segura de valores
                const campos = {
                    'idProducto': data.idProducto,
                    'codigoBarras': data.codigoBarras || '',
                    'nombreProducto': data.nombreProducto,
                    'precio': data.precio,
                    'stock': data.stock
                };

                // Llenar inputs si existen
                Object.keys(campos).forEach(id => {
                    const el = document.getElementById(id);
                    if (el) el.value = campos[id];
                });

                // Selects
                if(data.unidadMedida) {
                    const el = document.getElementById('unidadMedida');
                    if (el) el.value = data.unidadMedida;
                }
                if(data.categoria) {
                    const el = document.getElementById('categoriaSelect');
                    if (el) el.value = data.categoria.idCategoria;
                }

                // Bloqueo de stock (con validación de existencia)
                const stockInput = document.getElementById('stock');
                if (stockInput) stockInput.readOnly = true;

                // --- ELIMINAMOS EL AVISO AQUÍ ---
                const stockHelp = document.getElementById('stockHelp');
                if (stockHelp) {
                    stockHelp.style.display = 'block';
                }

            })
            .catch(err => {
                console.error('Error al cargar producto:', err);
            });
    }

    // --- MANEJO DE LOTES ---
    // --- MANEJO DE LOTES OPTIMIZADO CON FORMATO INTELIGENTE (5 COLUMNAS) ---
    function toggleLotes(idFila, btn) {
        const filaDetalle = document.getElementById(idFila);
        if (!filaDetalle) return;

        const container = filaDetalle.querySelector('.historial-container');
        const idProducto = idFila.replace('lotes-', '');
        const icono = btn ? btn.querySelector('i') : null;
        const estaVisible = filaDetalle.style.display === 'table-row';

        if (!estaVisible) {
            filaDetalle.style.display = 'table-row';
            if (icono) icono.style.transform = 'rotate(90deg)';

            fetch(`/productos/lotes/${idProducto}`)
                .then(res => {
                    if (!res.ok) throw new Error("Error al obtener lotes");
                    return res.json();
                })
                .then(data => {
                    const lotesActivos = Array.isArray(data) ? data.filter(l => l.stockActual > 0) : [];

                    if (lotesActivos.length > 0) {
                        // Estructura adaptada para 5 columnas (20% de ancho cada una para simetría perfecta)
                        let html = `<div class="w-100 d-flex justify-content-center py-2">
                        <div class="bg-white rounded-3 shadow-sm border overflow-hidden" style="max-width: 750px; width: 100%;">
                            <table class="table table-sm table-hover small text-center mb-0" style="color: #6c757d; table-layout: fixed;">
                                <thead class="table-light">
                                    <tr>
                                        <th style="width: 20%; font-weight: 600; border-bottom: 1px solid #e2e8f0; padding: 8px 0;">ID Lote</th>
                                        <th style="width: 20%; font-weight: 600; border-bottom: 1px solid #e2e8f0; padding: 8px 0;">F. Ingreso</th>
                                        <th style="width: 20%; font-weight: 600; border-bottom: 1px solid #e2e8f0; padding: 8px 0;">P. Compra</th>
                                        <th style="width: 20%; font-weight: 600; border-bottom: 1px solid #e2e8f0; padding: 8px 0;">Cant. Inicial</th>
                                        <th style="width: 20%; font-weight: 600; border-bottom: 1px solid #e2e8f0; padding: 8px 0;">Stock Disponible</th>
                                    </tr>
                                </thead>
                                <tbody>`;

                        lotesActivos.forEach(lote => {
                            // 1. Formateo de Fecha Seguro (De AAAA-MM-DD a DD/MM/AAAA)
                            let fechaFormateada = 'N/A';
                            if (lote.fecha) {
                                // Si contiene hora por algún motivo string se limpia, sino se corta directo
                                const fechaSucia = lote.fecha.includes('T') ? lote.fecha.split('T')[0] : lote.fecha;
                                const partes = fechaSucia.split('-');
                                if (partes.length === 3) {
                                    fechaFormateada = `${partes[2]}/${partes[1]}/${partes[0]}`;
                                }
                            }

                            // 2. Formateo de Costo (Precio de Compra)
                            const pCompra = typeof lote.precioCompra === 'number' ? lote.precioCompra.toFixed(2) : '0.00';

                            // 3. Formateo Dinámico de Cantidades (Inicial y Actual) según la unidad de medida
                            let cantInicialFormateada = '0';
                            let stockActualFormateado = '0';

                            if (lote.unidadMedida === 'KG') {
                                // Si es Kilos, forzar 3 decimales
                                cantInicialFormateada = typeof lote.cantidad === 'number' ? lote.cantidad.toFixed(3) : lote.cantidad;
                                stockActualFormateado = typeof lote.stockActual === 'number' ? lote.stockActual.toFixed(3) : lote.stockActual;
                            } else {
                                // Si es Unidad (o cualquier otra), remover decimales usando enteros limpitos
                                cantInicialFormateada = typeof lote.cantidad === 'number' ? Math.floor(lote.cantidad).toString() : lote.cantidad;
                                stockActualFormateado = typeof lote.stockActual === 'number' ? Math.floor(lote.stockActual).toString() : lote.stockActual;
                            }

                            // Etiqueta pequeña decorativa para la unidad de medida
                            const sufijo = lote.unidadMedida ? ` <small class="text-muted" style="font-size: 0.7rem;">${lote.unidadMedida}</small>` : '';

                            html += `<tr>
                                <td style="vertical-align: middle; padding: 8px 0;"># ${lote.idDetalleCompra}</td>
                                <td style="vertical-align: middle; padding: 8px 0;">${fechaFormateada}</td>
                                <td style="vertical-align: middle; padding: 8px 0;">S/ ${pCompra}</td>
                                <td style="vertical-align: middle; padding: 8px 0;">${cantInicialFormateada}${sufijo}</td>
                                <td style="vertical-align: middle; padding: 8px 0; font-weight: 700; color: #10b981;">
                                    ${stockActualFormateado}${sufijo}
                                </td>
                             </tr>`;
                        });

                        html += '</tbody></table></div></div>';
                        container.innerHTML = html;
                    } else {
                        container.innerHTML = '<p class="text-muted small text-center" style="margin: 15px;">No hay lotes con stock disponible para este producto.</p>';
                    }
                })
                .catch(err => {
                    console.error("Error al cargar lotes:", err);
                    container.innerHTML = '<p class="text-danger small text-center" style="margin: 15px;">Error al cargar los lotes del inventario.</p>';
                });
        } else {
            filaDetalle.style.display = 'none';
            if (icono) icono.style.transform = 'rotate(0deg)';
        }
    }

    function toggleAgotados(btn) {
        const tbody = btn.closest('tbody');
        const filasAgotadas = tbody.querySelectorAll('.agotado-row');
        filasAgotadas.forEach(fila => {
            fila.style.display = (fila.style.display === 'none') ? '' : 'none';
        });
    }

    function abrirModalEditar(id) {
        // 1. Cargar los datos mediante tu función existente
        editarProducto(id);

        // 2. Abrir el modal manualmente usando la API de Bootstrap
        const modalElement = document.getElementById('modalProducto');
        const modal = new bootstrap.Modal(modalElement);
        modal.show();
    }
</script>

</body>
