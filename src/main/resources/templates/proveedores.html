<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8">
  <title>Productos - Sistema de Ventas</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

  <script th:src="@{/js/tema.js}"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link th:href="@{/css/menu.css}" rel="stylesheet">
  <link th:href="@{/css/menu1.css}" rel="stylesheet">
  <link th:href="@{/css/modal.css}" rel="stylesheet">
</head>
<body>
<!-- Sidebar -->
<div th:replace="~{fragments/layout :: sidebar}"></div>

<!-- Topbar -->
<div th:replace="~{fragments/layout :: topbar}"></div>

<main class="content" id="mainContent">
  <div class="container-fluid">
    <div class="header-container d-flex flex-column justify-content-between align-items-start mb-4 gap-3">
      <div class="header-text text-start">
        <h2 class="fw-bold text-dynamic mb-1">Gestión de Proveedor</h2>
        <p class="text-muted-dynamic mb-0 small">Administra aquí todos tus proveedores</p>
      </div>

      <div class="controles-wrapper d-flex align-items-center w-100 gap-3">
        <div class="search-container custom-search-adaptive flex-grow-1">
          <input type="text" id="inputBusqueda" class="form-control"
                 th:value="${buscar}"
                 placeholder="Buscar proveedor"
                 onkeyup="filtrarProveedores(event)">
          <i class="fas fa-search"></i>
        </div>

        <div class="btn-group-adaptive d-flex flex-nowrap gap-2">
          <a th:href="@{/proveedores(verInactivos=${!verInactivos})}"
             class="btn shadow-sm"
             th:classappend="${verInactivos} ? 'btn-ver-activos' : 'btn-ver-inactivos'">
            <i class="fas" th:classappend="${verInactivos} ? 'fa-eye' : 'fa-eye-slash'"></i>
            <span th:text="${verInactivos} ? ' Ver Activos' : ' Ver Inactivos'"></span>
          </a>

          <button class="btn btn-new-cat shadow-sm" data-bs-toggle="modal" data-bs-target="#modalProveedor" onclick="nuevoFormulario()">
            <i class="fas fa-plus-circle"></i> <span>Agregar</span>
          </button>
        </div>
      </div>
    </div>

    <div class="crud-card p-4 shadow">
      <div class="table-responsive">
        <table class="table custom-table align-middle" id="tablaProveedores">
          <thead>
          <tr class="text-dynamic">
            <th class="ps-4">ID</th>
            <th>PROVEEDOR</th>
            <th>TELÉFONO</th>
            <th class="text-center">ACCIONES</th>
          </tr>
          </thead>
          <tbody>
          <tr th:each="p : ${proveedores}">
            <td class="ps-4 fw-bold" th:text="${p.idProveedor}"></td>
            <td class="nombre-prov" th:text="${p.nombre}"></td>
            <td th:text="${p.telefono}"></td>
            <td class="text-center">
              <div class="d-flex justify-content-center gap-2">
                <th:block th:if="${p.estado}">
                  <button class="btn-circle btn-edit" th:onclick="'editarProveedor(' + ${p.idProveedor} + ')'" data-bs-toggle="modal" data-bs-target="#modalProveedor">
                    <i class="fas fa-edit"></i>
                  </button>
                  <button class="btn-circle btn-delete" th:onclick="'confirmarEliminar(' + ${p.idProveedor} + ')'">
                    <i class="fas fa-trash-alt"></i>
                  </button>
                </th:block>

                <th:block th:if="${!p.estado}">
                  <a th:href="@{/proveedores/restaurar/{id}(id=${p.idProveedor})}"
                     class="btn-circle"
                     style="background: #28a745; color: white; display: flex; align-items: center; justify-content: center; text-decoration: none;"
                     title="Restaurar">
                    <i class="fas fa-trash-restore"></i>
                  </a>
                </th:block>
              </div>
            </td>
          </tr>
          </tbody>
        </table>
      </div>

      <div th:if="${totalPages > 1}" class="d-flex justify-content-between align-items-center mt-3">
        <div class="text-muted small">
          Página <span th:text="${currentPage + 1}"></span> de <span th:text="${totalPages}"></span>
        </div>
        <nav>
          <ul class="pagination pagination-sm mb-0">
            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
              <a class="page-link" th:href="@{/proveedores(page=${currentPage - 1}, verInactivos=${verInactivos}, buscar=${buscar})}">
                <i class="fas fa-chevron-left"></i>
              </a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                th:classappend="${i == currentPage} ? 'active'">
              <a class="page-link" th:href="@{/proveedores(page=${i}, verInactivos=${verInactivos}, buscar=${buscar})}" th:text="${i + 1}"></a>
            </li>
            <li class="page-item" th:classappend="${currentPage + 1 == totalPages} ? 'disabled'">
              <a class="page-link" th:href="@{/proveedores(page=${currentPage + 1}, verInactivos=${verInactivos}, buscar=${buscar})}">
                <i class="fas fa-chevron-right"></i>
              </a>
            </li>
          </ul>
        </nav>
      </div>
    </div>
  </div>
</main>

<div class="modal fade" id="modalProveedor" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 shadow-lg" style="border-radius: 15px;">
      <div class="modal-header border-0 p-4" style="background: linear-gradient(45deg, #4b6cb7, #182848); border-radius: 15px 15px 0 0;">
        <h5 class="modal-title fw-bold text-white" id="modalTitulo">Nuevo Proveedor</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <form th:action="@{/proveedores/guardar}" th:object="${proveedor}" method="post">
        <div class="modal-body p-4">
          <input type="hidden" th:field="*{idProveedor}" id="idProveedor">
          <div class="mb-3">
            <label class="form-label fw-bold text-dynamic">Nombre del Proveedor</label>
            <div class="input-group">
              <span class="input-group-text"><i class="fas fa-building"></i></span>
              <input type="text" th:field="*{nombre}" id="nombre" class="form-control" placeholder="Ej: Distribuidora Alianza" required>
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label fw-bold text-dynamic">Teléfono / Contacto</label>
            <div class="input-group">
              <span class="input-group-text"><i class="fas fa-phone"></i></span>
              <input type="text" th:field="*{telefono}" id="telefono" class="form-control" placeholder="999888777">
            </div>
          </div>
        </div>
        <div class="modal-footer border-0 p-4 pt-0">
          <button type="button" class="btn btn-secondary px-4" data-bs-dismiss="modal">Cerrar</button>
          <button type="submit" class="btn btn-new-cat px-4">Guardar Cambios</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/menu.js}"></script>

<script th:inline="javascript">
  document.addEventListener("DOMContentLoaded", function() {
    const successMsg = /*[[${success}]]*/ null;
    const errorMsg = /*[[${error}]]*/ null;
    const isDark = document.body.classList.contains('dark-mode');

    const swalBase = {
      background: isDark ? '#1a1d21' : '#fff',
      color: isDark ? '#fff' : '#000'
    };

    if (successMsg) {
      Swal.fire({ ...swalBase, icon: 'success', title: '¡Hecho!', text: successMsg, timer: 2000, showConfirmButton: false });
    }

    if (errorMsg) {
      Swal.fire({ ...swalBase, icon: 'error', title: 'Atención', text: errorMsg, confirmButtonColor: '#ff4d4d' });
    }

    // FOCO INTELIGENTE TRAS RECARGA
    const inputBusqueda = document.getElementById("inputBusqueda");
    if (inputBusqueda && inputBusqueda.value !== "") {
      inputBusqueda.focus();
      const val = inputBusqueda.value;
      inputBusqueda.value = '';
      inputBusqueda.value = val;
    }
  });

  // BUSQUEDA HÍBRIDA
  function filtrarProveedores(event) {
    const input = document.getElementById("inputBusqueda").value.toLowerCase();

    // 1. SI ES ENTER: Búsqueda profunda en servidor
    if (event && event.key === 'Enter') {
      const urlParams = new URLSearchParams(window.location.search);
      const verInactivos = urlParams.get('verInactivos') || 'false';
      window.location.href = `/proveedores?page=0&verInactivos=${verInactivos}&buscar=${encodeURIComponent(input)}`;
      return;
    }

    // 2. MIENTRAS ESCRIBE: Filtro visual instantáneo
    const filas = document.querySelectorAll("#tablaProveedores tbody tr");
    filas.forEach(fila => {
      const nombre = fila.querySelector(".nombre-prov")?.innerText.toLowerCase() || "";
      const id = fila.querySelector("td:first-child")?.innerText.toLowerCase() || "";
      fila.style.display = (nombre.includes(input) || id.includes(input)) ? "" : "none";
    });
  }

  function nuevoFormulario() {
    document.getElementById('modalTitulo').innerText = 'Nuevo Proveedor';
    document.getElementById('idProveedor').value = '';
    document.getElementById('nombre').value = '';
    document.getElementById('telefono').value = '';
    setTimeout(() => { document.getElementById('nombre').focus(); }, 450);
  }

  function editarProveedor(id) {
    document.getElementById('modalTitulo').innerText = 'Editar Proveedor';
    fetch(`/proveedores/editar/${id}`)
            .then(res => res.json())
            .then(data => {
              document.getElementById('idProveedor').value = data.idProveedor;
              document.getElementById('nombre').value = data.nombre || '';
              document.getElementById('telefono').value = data.telefono || '';
            })
            .catch(err => console.error(err));
  }

  function confirmarEliminar(id) {
    const isDark = document.body.classList.contains('dark-mode');
    Swal.fire({
      title: '¿Deshabilitar proveedor?',
      text: "El proveedor se moverá a la lista de inactivos.",
      icon: 'warning',
      showCancelButton: true,
      confirmButtonColor: '#ff4d4d',
      cancelButtonColor: '#6c757d',
      confirmButtonText: 'Sí, deshabilitar',
      background: isDark ? '#1a1d21' : '#fff',
      color: isDark ? '#fff' : '#000'
    }).then((result) => {
      if (result.isConfirmed) {
        window.location.href = `/proveedores/eliminar/${id}`;
      }
    });
  }
</script>
</body>
</html>
