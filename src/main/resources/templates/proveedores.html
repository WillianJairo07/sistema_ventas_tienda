<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8">
  <title>Proveedores - Sistema de Ventas</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">


  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link th:href="@{/css/menu.css}" rel="stylesheet">

</head>
<body>
<!-- Sidebar -->
<div th:replace="~{fragments/layout :: sidebar}"></div>

<!-- Topbar -->
<div th:replace="~{fragments/layout :: topbar}"></div>

<main class="content" id="mainContent">
  <div class="container-fluid">
    <!-- CABECERA (Copiada del estilo de Categorías) -->
    <div class="row align-items-end mb-4 g-3">
      <div class="col-12 col-xl-4">
        <h2 class="fw-bold text-dynamic mb-1">Gestión de Proveedores</h2>
        <p class="text-muted-dynamic mb-0 small">Administra aquí todos tus proveedores</p>
      </div>

      <div class="col-12 col-xl-8">
        <!-- Wrapper alineado a la derecha en PC -->
        <div class="d-flex flex-wrap flex-md-nowrap justify-content-xl-end align-items-center gap-2">

          <!-- Buscador -->
          <div class="search-container custom-search-adaptive">
            <i class="fas fa-search"></i>
            <input type="text" id="inputBusqueda" class="form-control shadow-sm"
                   th:value="${buscar}" placeholder="Buscar proveedor..." onkeyup="filtrarProveedores(event)">
          </div>

          <!-- Botones -->
          <div class="btn-group-adaptive d-flex gap-2">
            <a th:href="@{/proveedores(verInactivos=${!verInactivos})}"
               class="btn shadow-sm"
               th:classappend="${verInactivos} ? 'btn-ver-activos' : 'btn-ver-inactivos'">
              <i class="fas" th:classappend="${verInactivos} ? 'fa-eye' : 'fa-eye-slash'"></i>
              <span th:text="${verInactivos} ? ' Activos' : ' Inactivos'"></span>
            </a>

            <button class="btn btn-new-cat shadow-sm" data-bs-toggle="modal" data-bs-target="#modalProveedor" onclick="nuevoFormulario()">
              <i class="fas fa-plus-circle"></i> <span>Agregar</span>
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- TABLA (Estilo unificado) -->
    <div class="crud-card shadow-sm overflow-hidden border-0">
      <div class="table-responsive">
        <table class="table custom-table align-middle mb-0" id="tablaProveedores">
          <thead class="bg-light">
          <tr class="text-dynamic">
            <th class="text-center ps-4 py-3" style="font-size: 0.8rem; font-weight: 700;">ID</th>
            <th class="text-center py-3" style="font-size: 0.8rem; font-weight: 700;">PROVEEDOR</th>
            <th class="text-center py-3" style="font-size: 0.8rem; font-weight: 700;">TELÉFONO</th>
            <th class="text-center py-3" style="font-size: 0.8rem; font-weight: 700;">ACCIONES</th>
          </tr>
          </thead>
          <tbody>
          <tr th:each="p : ${proveedores}" class="border-bottom">
            <td class="ps-4 fw-bold text-muted text-center" th:text="${p.idProveedor}"></td>
            <td class="nombre-prov fw-medium text-muted text-center small" th:text="${p.nombre}"></td>
            <td class="text-center">
            <span class="badge rounded-pill bg-light text-muted border shadow-sm fw-normal px-3"
                  th:text="${p.telefono}"
                  style="font-size: 0.75rem;">
            </span>
            </td>
            <td>
              <div class="d-flex justify-content-center gap-2">
                <th:block th:if="${p.estado}">
                  <button class="btn-circle btn-edit" th:onclick="'editarProveedor(' + ${p.idProveedor} + ')'" data-bs-toggle="modal" data-bs-target="#modalProveedor">
                    <i class="fas fa-edit"></i>
                  </button>
                  <button class="btn-circle btn-delete" th:onclick="'confirmarEliminar(' + ${p.idProveedor} + ')'">
                    <i class="fas fa-trash-alt"></i>
                  </button>
                </th:block>
                <th:block th:if="${!p.estado}">
                  <a th:href="@{/proveedores/restaurar/{id}(id=${p.idProveedor})}" class="btn-circle btn-restore" title="Restaurar">
                    <i class="fas fa-trash-restore"></i>
                  </a>
                </th:block>
              </div>
            </td>
          </tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- PAGINACIÓN (Estilo unificado) -->
    <div th:if="${totalPages > 1}" class="d-flex flex-column flex-md-row justify-content-between align-items-center mt-4 px-2 gap-3">
      <div class="text-dark small fw-medium">
        Página <span class="fw-bold text-primary" th:text="${currentPage + 1}"></span> de <span class="fw-bold" th:text="${totalPages}"></span>
      </div>
      <nav>
        <ul class="pagination pagination-sm mb-0">
          <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
            <a class="page-link shadow-sm" th:href="@{/proveedores(page=${currentPage - 1}, verInactivos=${verInactivos}, buscar=${buscar})}">
              <i class="fas fa-chevron-left"></i>
            </a>
          </li>

          <li class="page-item mx-1" th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
              th:if="${(currentPage == 0 and i < 3) or (currentPage == totalPages - 1 and i > totalPages - 4) or (i >= currentPage - 1 and i <= currentPage + 1)}"
              th:classappend="${i == currentPage} ? 'active'">
            <a class="page-link shadow-sm" th:href="@{/proveedores(page=${i}, verInactivos=${verInactivos}, buscar=${buscar})}" th:text="${i + 1}"></a>
          </li>

          <li class="page-item" th:classappend="${currentPage + 1 >= totalPages} ? 'disabled'">
            <a class="page-link shadow-sm" th:href="@{/proveedores(page=${currentPage + 1}, verInactivos=${verInactivos}, buscar=${buscar})}">
              <i class="fas fa-chevron-right"></i>
            </a>
          </li>
        </ul>
      </nav>
    </div>
  </div>
</main>

<div class="modal fade" id="modalProveedor" tabindex="-1" aria-labelledby="modalTitulo" aria-hidden="true" data-bs-backdrop="static">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 shadow-lg">
      <div class="modal-header border-0">
        <h5 class="modal-title fw-bold text-white" id="modalTitulo">
          <i class="fas fa-truck me-2"></i>Nuevo Proveedor
        </h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Cerrar"></button>
      </div>

      <form th:action="@{/proveedores/guardar}" th:object="${proveedor}" method="post">
        <div class="modal-body p-4">
          <input type="hidden" th:field="*{idProveedor}" id="idProveedor">

          <div class="mb-3">
            <label class="form-label fw-bold text-dynamic mb-1" style="font-size: 0.9rem;">Nombre del Proveedor</label>
            <div class="input-group">
              <span class="input-group-text bg-light border-end-0" style="border: 1px solid #dee2e6;"><i class="fas fa-building text-muted"></i></span>
              <input type="text" th:field="*{nombre}" id="nombre" class="form-control shadow-none border-start-0"
                     placeholder="Ej: Distribuidora Alianza" required
                     style="height: 42px; font-size: 0.9rem; border: 1px solid #dee2e6;">
            </div>
          </div>

          <div class="mb-2">
            <label class="form-label fw-bold text-dynamic mb-1" style="font-size: 0.9rem;">Teléfono / Contacto</label>
            <div class="input-group">
              <span class="input-group-text bg-light border-end-0" style="border: 1px solid #dee2e6;"><i class="fas fa-phone text-muted"></i></span>
              <input type="text" th:field="*{telefono}" id="telefono" class="form-control shadow-none border-start-0"
                     placeholder="Ej: 999888777"
                     style="height: 42px; font-size: 0.9rem; border: 1px solid #dee2e6;">
            </div>
            <small class="text-muted mt-2 d-flex align-items-center" style="font-size: 0.72rem; opacity: 0.8;">
              <i class="fas fa-info-circle me-1" style="font-size: 0.65rem;"></i> Ingrese un número de contacto válido.
            </small>
          </div>
        </div>

        <div class="modal-footer border-0 p-4 pt-0">
          <button type="button" class="btn btn-secondary-custom px-4" data-bs-dismiss="modal">
            Cancelar
          </button>
          <button type="submit" class="btn btn-new-cat px-4">
            <i class="fas fa-save me-2"></i>Guardar Cambios
          </button>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/menu.js}"></script>

<script th:inline="javascript">
  document.addEventListener("DOMContentLoaded", function() {
    const successMsg = /*[[${success}]]*/ null;
    const errorMsg = /*[[${error}]]*/ null;

    // Colores basados en tu módulo de Categorías
    const colors = {
      bg: '#ffffff',
      text: '#1b254b',
      accent: '#3b82f6',
      danger: '#ee5d5d'
    };

    if (successMsg) {
      Swal.fire({
        icon: 'success',
        title: '¡Hecho!',
        text: successMsg,
        timer: 2000,
        showConfirmButton: false,
        background: colors.bg,
        color: colors.text,
        iconColor: colors.accent,
        customClass: { popup: 'border-radius-15' }
      });
    }

    if (errorMsg) {
      Swal.fire({
        icon: 'error',
        title: 'Atención',
        text: errorMsg,
        background: colors.bg,
        color: colors.text,
        confirmButtonColor: colors.accent,
        iconColor: colors.danger
      });
    }

    // FOCO INTELIGENTE TRAS RECARGA
    const inputBusqueda = document.getElementById("inputBusqueda");
    if (inputBusqueda && inputBusqueda.value !== "") {
      inputBusqueda.focus();
      const val = inputBusqueda.value;
      inputBusqueda.value = '';
      inputBusqueda.value = val;
    }
  });

  // BUSQUEDA HÍBRIDA
  function filtrarProveedores(event) {
    const input = document.getElementById("inputBusqueda").value.toLowerCase();

    // 1. SI ES ENTER: Búsqueda profunda en servidor
    if (event && event.key === 'Enter') {
      const urlParams = new URLSearchParams(window.location.search);
      const verInactivos = urlParams.get('verInactivos') || 'false';
      window.location.href = `/proveedores?page=0&verInactivos=${verInactivos}&buscar=${encodeURIComponent(input)}`;
      return;
    }

    // 2. MIENTRAS ESCRIBE: Filtro visual instantáneo
    const filas = document.querySelectorAll("#tablaProveedores tbody tr");
    filas.forEach(fila => {
      const nombre = fila.querySelector(".nombre-prov")?.innerText.toLowerCase() || "";
      const id = fila.querySelector("td:first-child")?.innerText.toLowerCase() || "";
      fila.style.display = (nombre.includes(input) || id.includes(input)) ? "" : "none";
    });
  }

  // --- FUNCIONES DE FORMULARIO CON FOCO AL FINAL ---
  function nuevoFormulario() {
    const modalEl = document.getElementById('modalProveedor'); // Ajusta si el ID de tu modal difiere
    const inputNombre = document.getElementById('nombre');

    document.getElementById('modalTitulo').innerHTML = '<i class="fas fa-plus-circle me-2"></i>Nuevo Proveedor';
    document.getElementById('idProveedor').value = '';
    if (inputNombre) inputNombre.value = '';
    document.getElementById('telefono').value = '';

  }

  function editarProveedor(id) {
    const modalEl = document.getElementById('modalProveedor');
    const inputNombre = document.getElementById('nombre');

    document.getElementById('modalTitulo').innerHTML = '<i class="fas fa-edit me-2"></i>Editar Proveedor';

    fetch(`/proveedores/editar/${id}`)
            .then(res => res.json())
            .then(data => {
              document.getElementById('idProveedor').value = data.idProveedor;
              if (inputNombre) inputNombre.value = data.nombre || '';
              document.getElementById('telefono').value = data.telefono || '';

            })
            .catch(err => {
              console.error('Error:', err);
              Swal.fire({
                icon: 'error',
                title: 'Error de red',
                text: 'No se pudo obtener el detalle del proveedor.',
                background: '#ffffff',
                color: '#1b254b',
                confirmButtonColor: '#3b82f6',
                customClass: { popup: 'border-radius-15' }
              });
            });
  }

  function confirmarEliminar(id) {
    Swal.fire({
      title: '¿Eliminar proveedor?',
      text: "El proveedor se moverá a la lista de inactivos.",
      icon: 'warning',
      showCancelButton: true,
      confirmButtonColor: '#3b82f6', // Unificado al azul corporativo
      cancelButtonColor: '#64748b',
      confirmButtonText: 'Sí, mover',
      cancelButtonText: 'Cancelar',
      background: '#ffffff',
      color: '#1b254b',
      customClass: { popup: 'border-radius-15' } // Redondeado unificado
    }).then((result) => {
      if (result.isConfirmed) {
        window.location.href = `/proveedores/eliminar/${id}`;
      }
    });
  }
</script>
</body>
</html>
