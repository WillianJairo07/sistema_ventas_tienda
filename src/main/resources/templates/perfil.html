<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Perfil - Sistema de Ventas</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

    <script th:src="@{/js/tema.js}"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link th:href="@{/css/menu.css}" rel="stylesheet">
</head>
<body>

<!-- Sidebar -->
<div th:replace="~{fragments/layout :: sidebar}"></div>

<!-- Topbar -->
<div th:replace="~{fragments/layout :: topbar}"></div>

<main class="content" id="mainContent">
    <div class="container-fluid">
        <div class="row">
            <div class="col-lg-4 mb-4">
                <div class="crud-card p-4 text-center shadow-sm">
                    <div class="position-relative d-inline-block mb-3">
                        <img th:src="'https://ui-avatars.com/api/?name=' + ${usuario.nombre} + '&background=4b6cb7&color=fff&size=128'"
                             class="rounded-circle border border-4 border-white shadow-sm" alt="Avatar">
                    </div>
                    <h4 class="fw-bold text-dynamic mb-1" th:text="${usuario.nombre}">Nombre</h4>
                    <p class="text-muted-dynamic mb-3" th:text="'@' + ${usuario.username}">@username</p>
                </div>
            </div>

            <div class="col-lg-8">
                <div class="crud-card p-4 shadow-sm">
                    <h5 class="fw-bold text-dynamic mb-4">Información Personal</h5>

                    <form th:action="@{/usuarios/perfil/actualizar}" method="post">
                        <input type="hidden" name="idUsuario" th:value="${usuario.idUsuario}">

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold text-dynamic small">Nombre Completo</label>
                                <div class="input-group custom-group">
                                    <span class="input-group-text bg-transparent border-0"><i class="fas fa-user text-muted-dynamic"></i></span>
                                    <input type="text" name="nombre" th:value="${usuario.nombre}" class="form-control bg-transparent border-0 text-dynamic" required>
                                </div>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold text-dynamic small">Nombre de Usuario</label>
                                <div class="input-group custom-group opacity-75">
                                    <span class="input-group-text bg-transparent border-0"><i class="fas fa-at text-muted-dynamic"></i></span>
                                    <input type="text" th:value="${usuario.username}" class="form-control bg-transparent border-0 text-dynamic" readonly>
                                </div>
                            </div>
                        </div>

                        <hr class="my-4 border-dynamic">

                        <h5 class="fw-bold text-dynamic mb-4">Seguridad</h5>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold text-dynamic small">Nueva Contraseña</label>
                                <div class="input-group custom-group">
                                    <span class="input-group-text bg-transparent border-0"><i class="fas fa-lock text-muted-dynamic"></i></span>
                                    <input type="password" name="password" class="form-control bg-transparent border-0 text-dynamic" placeholder="Dejar en blanco para no cambiar">
                                </div>
                            </div>
                        </div>

                        <div class="text-end mt-4">
                            <button type="submit" class="btn btn-new-cat px-5 shadow-sm">
                                <i class="fas fa-save me-2"></i>Guardar Cambios
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/menu.js}"></script>
</body>
</html>
