<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Categorias - Sistema de Ventas</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link th:href="@{/css/menu.css}" rel="stylesheet">
</head>
<body>

<!-- Sidebar -->
<div th:replace="~{fragments/layout :: sidebar}"></div>

<!-- Topbar -->
<div th:replace="~{fragments/layout :: topbar}"></div>

<main class="content" id="mainContent">
    <div class="container-fluid">
        <!-- CABECERA (Estilo Unificado) -->
        <div class="row align-items-end mb-4 g-3">
            <div class="col-12 col-xl-4">
                <h2 class="fw-bold text-dynamic mb-1">Gestión de Clientes</h2>
                <p class="text-muted-dynamic mb-0 small">Administra aquí todos tus clientes</p>
            </div>

            <div class="col-12 col-xl-8">
                <div class="d-flex flex-wrap flex-md-nowrap justify-content-xl-end align-items-center gap-2">
                    <!-- Buscador -->
                    <div class="search-container custom-search-adaptive">
                        <i class="fas fa-search"></i>
                        <input type="text" id="inputBusqueda" class="form-control shadow-sm"
                               th:value="${buscar}" placeholder="Buscar cliente..." onkeyup="manejarBusqueda(event)">
                    </div>

                    <!-- Botones -->
                    <div class="btn-group-adaptive d-flex gap-2">
                        <a th:href="@{/clientes(verInactivos=${!verInactivos})}"
                           class="btn shadow-sm"
                           th:classappend="${verInactivos} ? 'btn-ver-activos' : 'btn-ver-inactivos'">
                            <i class="fas" th:classappend="${verInactivos} ? 'fa-eye' : 'fa-eye-slash'"></i>
                            <span th:text="${verInactivos} ? ' Activos' : ' Inactivos'"></span>
                        </a>
                        <button class="btn btn-new-cat shadow-sm" data-bs-toggle="modal" data-bs-target="#modalCliente" onclick="nuevoFormulario()">
                            <i class="fas fa-plus-circle"></i> <span>Agregar</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- TABLA (Estilo Unificado) -->
        <div class="crud-card shadow-sm overflow-hidden border-0">
            <div class="table-responsive">
                <table class="table custom-table align-middle mb-0" id="tablaClientes">
                    <thead class="bg-light">
                    <tr class="text-dynamic">
                        <th class="text-center ps-4 py-3" style="font-size: 0.8rem; font-weight: 700;">ID</th>
                        <th class="text-center py-3" style="font-size: 0.8rem; font-weight: 700;">NOMBRE COMPLETO</th>
                        <th class="text-center py-3" style="font-size: 0.8rem; font-weight: 700;">FECHA REGISTRO</th>
                        <th class="text-center py-3" style="font-size: 0.8rem; font-weight: 700;">ACCIONES</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="c : ${clientes}" class="border-bottom">
                        <td class="ps-4 fw-bold text-muted text-center" th:text="${c.idCliente}"></td>
                        <td class="nombre-cli fw-medium text-muted text-center small">
                            <span th:text="${c.nombre}"></span>
                            <span th:text="${c.apellidoPat + ' ' + (c.apellidoMat ?: '')}"></span>
                        </td>
                        <td class="text-center text-muted small" th:text="${#temporals.format(c.fechaRegistro, 'dd/MM/yyyy HH:mm')}"></td>
                        <td>
                            <div class="d-flex justify-content-center gap-2">
                                <th:block th:if="${c.estado}">
                                    <button class="btn-circle btn-edit" th:onclick="'editarCliente(' + ${c.idCliente} + ')'" data-bs-toggle="modal" data-bs-target="#modalCliente">
                                        <i class="fas fa-edit"></i>
                                    </button>
                                    <button class="btn-circle btn-delete" th:onclick="'confirmarEliminar(' + ${c.idCliente} + ')'">
                                        <i class="fas fa-trash-alt"></i>
                                    </button>
                                </th:block>
                                <th:block th:if="${!c.estado}">
                                    <a th:href="@{/clientes/restaurar/{id}(id=${c.idCliente})}" class="btn-circle btn-restore">
                                        <i class="fas fa-trash-restore"></i>
                                    </a>
                                </th:block>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>


        <div th:if="${totalPages > 1}" class="d-flex flex-column flex-md-row justify-content-between align-items-center mt-4 px-2 gap-3">
            <div class="text-dark small fw-medium">
                Página <span class="fw-bold text-primary" th:text="${currentPage + 1}"></span> de <span class="fw-bold" th:text="${totalPages}"></span>
            </div>
            <nav>
                <ul class="pagination pagination-sm mb-0">
                    <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                        <a class="page-link shadow-sm" th:href="@{/clientes(page=${currentPage - 1}, verInactivos=${verInactivos}, buscar=${buscar})}">
                            <i class="fas fa-chevron-left"></i>
                        </a>
                    </li>

                    <li class="page-item mx-1" th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                        th:if="${(currentPage == 0 and i < 3) or (currentPage == totalPages - 1 and i > totalPages - 4) or (i >= currentPage - 1 and i <= currentPage + 1)}"
                        th:classappend="${i == currentPage} ? 'active'">
                        <a class="page-link shadow-sm" th:href="@{/clientes(page=${i}, verInactivos=${verInactivos}, buscar=${buscar})}" th:text="${i + 1}"></a>
                    </li>

                    <li class="page-item" th:classappend="${currentPage + 1 >= totalPages} ? 'disabled'">
                        <a class="page-link shadow-sm" th:href="@{/clientes(page=${currentPage + 1}, verInactivos=${verInactivos}, buscar=${buscar})}">
                            <i class="fas fa-chevron-right"></i>
                        </a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>
</main>

<div class="modal fade" id="modalCliente" tabindex="-1" aria-labelledby="modalTitulo" aria-hidden="true" data-bs-backdrop="static">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg">

            <!-- CABECERA: Igual a Categorías -->
            <div class="modal-header border-0">
                <h5 class="modal-title fw-bold text-white" id="modalTitulo">
                    <i class="fas fa-plus-circle me-2"></i>Nuevo Cliente
                </h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Cerrar"></button>
            </div>

            <form th:action="@{/clientes/guardar}" th:object="${cliente}" method="post">
                <div class="modal-body p-4">
                    <input type="hidden" th:field="*{idCliente}" id="idCliente">

                    <!-- CAMPO: NOMBRE -->
                    <div class="mb-3">
                        <label class="form-label fw-bold text-dynamic mb-1" style="font-size: 0.9rem;">Nombre</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0" style="border: 1px solid #dee2e6;">
                                <i class="fas fa-user text-muted"></i>
                            </span>
                            <input type="text" th:field="*{nombre}" id="nombre"
                                   class="form-control shadow-none border-start-0"
                                   placeholder="Ej: Juan Antonio" required
                                   style="height: 42px; font-size: 0.9rem; border: 1px solid #dee2e6;">
                        </div>
                    </div>

                    <!-- CAMPOS: APELLIDOS -->
                    <div class="row">
                        <div class="col-md-6 mb-2">
                            <label class="form-label fw-bold text-dynamic mb-1" style="font-size: 0.9rem;">Apellido Paterno</label>
                            <input type="text" th:field="*{apellidoPat}" id="apellidoPat"
                                   class="form-control shadow-none"
                                   placeholder="Ej: Pérez" required
                                   style="height: 42px; font-size: 0.9rem; border: 1px solid #dee2e6;">
                        </div>
                        <div class="col-md-6 mb-2">
                            <label class="form-label fw-bold text-dynamic mb-1" style="font-size: 0.9rem;">Apellido Materno</label>
                            <input type="text" th:field="*{apellidoMat}" id="apellidoMat"
                                   class="form-control shadow-none"
                                   placeholder="Ej: García"
                                   style="height: 42px; font-size: 0.9rem; border: 1px solid #dee2e6;">
                        </div>
                    </div>

                    <!-- MENSAJE DE AYUDA: Igual a Categorías -->
                    <small class="text-muted mt-3 d-flex align-items-center" style="font-size: 0.72rem; opacity: 0.8;">
                        <i class="fas fa-info-circle me-1" style="font-size: 0.65rem;"></i> Verifique los datos antes de guardar para evitar duplicados.
                    </small>
                </div>

                <!-- FOOTER: Botones con clases de Categorías -->
                <div class="modal-footer border-0 p-4 pt-0">
                    <button type="button" class="btn btn-secondary-custom px-4" data-bs-dismiss="modal">
                        Cancelar
                    </button>
                    <button type="submit" class="btn btn-new-cat px-4">
                        <i class="fas fa-save me-2"></i>Guardar Cambios
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/menu.js}"></script>
<script th:inline="javascript">
    // Variables globales de estado para usar en redirecciones
    const CURRENT_VER_INACTIVOS = /*[[${verInactivos}]]*/ false;
    const CURRENT_BUSQUEDA = /*[[${buscar}]]*/ '';

    document.addEventListener("DOMContentLoaded", function() {
        const successMsg = /*[[${success}]]*/ null;
        const errorMsg = /*[[${error}]]*/ null;

        // --- ALERTAS CON COLORES CORPORATIVOS UNIFICADOS ---
        if (successMsg) {
            Swal.fire({
                icon: 'success',
                title: '¡Hecho!',
                text: successMsg,
                timer: 2000,
                showConfirmButton: false,
                background: '#ffffff',
                color: '#1b254b',
                iconColor: '#3b82f6',
                customClass: { popup: 'border-radius-15' }
            });
        }

        if (errorMsg) {
            Swal.fire({
                icon: 'error',
                title: 'Atención',
                text: errorMsg,
                background: '#ffffff',
                color: '#1b254b',
                confirmButtonColor: '#3b82f6',
                iconColor: '#ee5d5d'
            });
        }

        // --- BÚSQUEDA: MANTENER FOCO AL RECARGAR ---
        const inputBusqueda = document.getElementById("inputBusqueda");
        if (inputBusqueda && inputBusqueda.value !== "") {
            inputBusqueda.focus();
            const val = inputBusqueda.value;
            inputBusqueda.value = '';
            inputBusqueda.value = val;
        }
    });

    // BUSQUEDA HÍBRIDA: Visual al escribir, Servidor al presionar Enter
    function manejarBusqueda(event) {
        const texto = document.getElementById("inputBusqueda").value.toLowerCase();

        // 1. SI PRESIONA ENTER: Búsqueda profunda (Va a la Base de Datos)
        if (event.key === 'Enter') {
            window.location.href = `/clientes?buscar=${encodeURIComponent(texto)}&verInactivos=${CURRENT_VER_INACTIVOS}`;
            return;
        }

        // 2. MIENTRAS ESCRIBE: Filtro visual rápido (Solo lo que hay en la página actual)
        const filas = document.querySelectorAll(".table tbody tr");

        filas.forEach(fila => {
            const nombreCompleto = fila.querySelector(".nombre-cli")?.innerText.toLowerCase() || "";
            const idCliente = fila.querySelector(".text-neon")?.innerText.toLowerCase() || "";

            if (nombreCompleto.includes(texto) || idCliente.includes(texto)) {
                fila.style.display = "";
            } else {
                fila.style.display = "none";
            }
        });
    }

    function editarCliente(id) {
        document.getElementById('modalTitulo').innerHTML = '<i class="fas fa-edit me-2"></i>Editar Cliente';
        const modalEl = document.getElementById('modalCliente'); // Asegúrate que tu id de modal coincida
        const nombreInput = document.getElementById('nombre');

        fetch(`/clientes/editar/${id}`)
            .then(res => {
                if (!res.ok) throw new Error('Error al obtener datos');
                return res.json();
            })
            .then(data => {
                document.getElementById('idCliente').value = data.idCliente;
                nombreInput.value = data.nombre || '';
                document.getElementById('apellidoPat').value = data.apellidoPat || '';
                document.getElementById('apellidoMat').value = data.apellidoMat || '';

            })
            .catch(err => {
                console.error("Error al cargar cliente:", err);
                Swal.fire({
                    icon: 'error',
                    title: 'Error de red',
                    text: 'No se pudo obtener la información del cliente.',
                    background: '#ffffff',
                    color: '#1b254b',
                    confirmButtonColor: '#3b82f6',
                    iconColor: '#ee5d5d'
                });
            });
    }

    function confirmarEliminar(id) {
        Swal.fire({
            title: '¿Eliminar cliente?',
            text: "El cliente se moverá a la lista de inactivos.",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#3b82f6',
            cancelButtonColor: '#64748b',
            confirmButtonText: 'Sí, mover',
            cancelButtonText: 'Cancelar',
            background: '#ffffff',
            color: '#1b254b',
            iconColor: '#ee5d5d'
        }).then((result) => {
            if (result.isConfirmed) {
                window.location.href = "/clientes/eliminar/" + id;
            }
        });
    }

    function confirmarRestaurar(id) {
        Swal.fire({
            title: '¿Restaurar cliente?',
            text: "El cliente volverá a aparecer en la lista de activos.",
            icon: 'info',
            showCancelButton: true,
            confirmButtonColor: '#3b82f6',
            cancelButtonColor: '#64748b',
            confirmButtonText: 'Sí, restaurar',
            cancelButtonText: 'Cancelar',
            background: '#ffffff',
            color: '#1b254b',
            iconColor: '#3b82f6',
            customClass: { popup: 'border-radius-15' }
        }).then((result) => {
            if (result.isConfirmed) {
                window.location.href = "/clientes/restaurar/" + id;
            }
        });
    }

    function nuevoFormulario() {
        const nombreInput = document.getElementById('nombre');
        const modalEl = document.getElementById('modalCliente');

        document.getElementById('modalTitulo').innerHTML = '<i class="fas fa-plus-circle me-2"></i>Nuevo Cliente';
        document.getElementById('idCliente').value = '';
        nombreInput.value = '';
        document.getElementById('apellidoPat').value = '';
        document.getElementById('apellidoMat').value = '';

    }
</script>
</body>
</html>
