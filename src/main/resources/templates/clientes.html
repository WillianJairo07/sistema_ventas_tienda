<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Categorias - Sistema de Ventas</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

    <script th:src="@{/js/tema.js}"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link th:href="@{/css/menu.css}" rel="stylesheet">
    <link th:href="@{/css/menu1.css}" rel="stylesheet">
    <link th:href="@{/css/modal.css}" rel="stylesheet">
</head>
<body>

<!-- Sidebar -->
<div th:replace="~{fragments/layout :: sidebar}"></div>

<!-- Topbar -->
<div th:replace="~{fragments/layout :: topbar}"></div>

<main class="content" id="mainContent">
    <div class="container-fluid">
        <div class="header-container d-flex flex-column justify-content-between align-items-start mb-4 gap-3">
            <div class="header-text text-start">
                <h2 class="fw-bold text-dynamic mb-1">Gestión de Clientes</h2>
                <p class="text-muted-dynamic mb-0 small">Administra aquí tus clientes.</p>
            </div>

            <div class="controles-wrapper d-flex align-items-center w-100 gap-3">
                <div class="search-container custom-search-adaptive flex-grow-1">
                    <input type="text" id="inputBusqueda" class="form-control"
                           th:value="${buscar}"
                           placeholder="Escribe para filtrar o presiona Enter para buscar todo..."
                           onkeyup="manejarBusqueda(event)">
                    <i class="fas fa-search"></i>
                </div>

                <div class="btn-group-adaptive d-flex flex-nowrap gap-2">
                    <a th:href="@{/clientes(verInactivos=${!verInactivos}, buscar=${buscar})}"
                       class="btn shadow-sm"
                       th:classappend="${verInactivos} ? 'btn-ver-activos' : 'btn-ver-inactivos'">
                        <i class="fas" th:classappend="${verInactivos} ? 'fa-eye' : 'fa-eye-slash'"></i>
                        <span th:text="${verInactivos} ? ' Ver Activos' : ' Ver Inactivos'"></span>
                    </a>

                    <button class="btn btn-new-cat shadow-sm" data-bs-toggle="modal" data-bs-target="#modalCliente" onclick="nuevoFormulario()">
                        <i class="fas fa-plus-circle"></i> <span>Nuevo Cliente</span>
                    </button>
                </div>
            </div>
        </div>

        <div class="crud-card p-4 shadow">
            <div class="table-responsive">
                <table class="table custom-table align-middle">
                    <thead>
                    <tr class="text-dynamic">
                        <th class="ps-4">ID</th>
                        <th>NOMBRE COMPLETO</th>
                        <th>FECHA REGISTRO</th>
                        <th class="text-center">ACCIONES</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="c : ${clientes}" class="fade-in">
                        <td class="ps-4 fw-bold text-neon" th:text="${c.idCliente}"></td>
                        <td class="nombre-cli">
                            <span class="text-dynamic" th:text="${c.nombre}"></span>
                            <span class="text-muted-dynamic" th:text="${c.apellidoPat + ' ' + (c.apellidoMat ?: '')}"></span>
                        </td>
                        <td class="text-muted-dynamic" th:text="${#temporals.format(c.fechaRegistro, 'dd/MM/yyyy HH:mm')}"></td>
                        <td class="text-center">
                            <div class="d-flex justify-content-center gap-2">
                                <th:block th:if="${c.estado}">
                                    <button class="btn-circle btn-edit" th:onclick="'editarCliente(' + ${c.idCliente} + ')'" data-bs-toggle="modal" data-bs-target="#modalCliente">
                                        <i class="fas fa-edit"></i>
                                    </button>
                                    <button class="btn-circle btn-delete" th:onclick="'confirmarEliminar(' + ${c.idCliente} + ')'">
                                        <i class="fas fa-trash-alt"></i>
                                    </button>
                                </th:block>
                                <th:block th:if="${!c.estado}">
                                    <button class="btn-circle btn-restore" th:onclick="'confirmarRestaurar(' + ${c.idCliente} + ')'">
                                        <i class="fas fa-trash-restore"></i>
                                    </button>
                                </th:block>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div> <div class="d-flex justify-content-between align-items-center mt-3 px-2" th:if="${totalPages > 0}">
        <div class="text-muted-dynamic small">
            Página <span class="fw-bold" th:text="${currentPage + 1}"></span> de <span th:text="${totalPages}"></span>
        </div>
        <nav>
            <ul class="pagination pagination-sm mb-0">
                <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                    <a class="page-link shadow-sm" th:href="@{/clientes(page=${currentPage - 1}, verInactivos=${verInactivos}, buscar=${buscar})}">
                        <i class="fas fa-chevron-left"></i>
                    </a>
                </li>
                <li class="page-item mx-1" th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                    th:classappend="${i == currentPage} ? 'active'">
                    <a class="page-link shadow-sm" th:href="@{/clientes(page=${i}, verInactivos=${verInactivos}, buscar=${buscar})}" th:text="${i + 1}"></a>
                </li>
                <li class="page-item" th:classappend="${currentPage + 1 >= totalPages} ? 'disabled'">
                    <a class="page-link shadow-sm" th:href="@{/clientes(page=${currentPage + 1}, verInactivos=${verInactivos}, buscar=${buscar})}">
                        <i class="fas fa-chevron-right"></i>
                    </a>
                </li>
            </ul>
        </nav>
    </div>
    </div>
</main>

<div class="modal fade" id="modalCliente" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg custom-modal" style="border-radius: 15px">
            <div class="modal-header border-0 p-4" style="background: linear-gradient(45deg, #4b6cb7, #182848); border-radius: 15px 15px 0 0;">
                <h5 class="modal-title fw-bold text-white" id="modalTitulo">Nuevo Cliente</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <form th:action="@{/clientes/guardar}" th:object="${cliente}" method="post">
                <div class="modal-body p-4">
                    <input type="hidden" th:field="*{idCliente}" id="idCliente">

                    <div class="mb-3">
                        <label class="form-label fw-bold text-dynamic">Nombre</label>
                        <div class="input-group custom-input-group">
                            <span class="input-group-text"><i class="fas fa-user"></i></span>
                            <input type="text" th:field="*{nombre}" id="nombre" class="form-control"
                                   placeholder="Escribe tu nombre" required autocomplete="off">
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold text-dynamic" >Apellido Paterno</label>
                            <input type="text" th:field="*{apellidoPat}" id="apellidoPat" class="form-control"
                                   placeholder="Apellido paterno" required autocomplete="off">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold text-dynamic">Apellido Materno</label>
                            <input type="text" th:field="*{apellidoMat}" id="apellidoMat" class="form-control"
                                   placeholder="Apellido materno" autocomplete="off">
                        </div>
                    </div>
                </div>
                <div class="modal-footer border-0 p-4 pt-0">
                    <button type="button" class="btn btn-secondary px-4 rounded-pill" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-new-cat px-4 rounded-pill shadow-neon" style="border-radius: 8px !important;">
                        <i class="fas fa-save me-1"></i> Guardar Cliente
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/menu.js}"></script>
<script th:inline="javascript">
    // Variables globales de estado para usar en redirecciones
    const CURRENT_VER_INACTIVOS = /*[[${verInactivos}]]*/ false;
    const CURRENT_BUSQUEDA = /*[[${buscar}]]*/ '';

    document.addEventListener("DOMContentLoaded", function() {
        const successMsg = /*[[${success}]]*/ null;
        const errorMsg = /*[[${error}]]*/ null;
        const isDark = document.body.classList.contains('dark-mode');

        if (successMsg) Swal.fire({ icon: 'success', title: '¡Éxito!', text: successMsg, background: isDark ? '#1a1d21' : '#fff', color: isDark ? '#fff' : '#000', showConfirmButton: false, timer: 2000 });
        if (errorMsg) Swal.fire({ icon: 'error', title: 'Error', text: errorMsg, background: isDark ? '#1a1d21' : '#fff', color: isDark ? '#fff' : '#000' });
    });

    // BUSQUEDA HÍBRIDA: Visual al escribir, Servidor al presionar Enter
    function manejarBusqueda(event) {
        const texto = document.getElementById("inputBusqueda").value.toLowerCase();

        // 1. SI PRESIONA ENTER: Búsqueda profunda (Va a la Base de Datos)
        if (event.key === 'Enter') {
            window.location.href = `/clientes?buscar=${encodeURIComponent(texto)}&verInactivos=${CURRENT_VER_INACTIVOS}`;
            return;
        }

        // 2. MIENTRAS ESCRIBE: Filtro visual rápido (Solo lo que hay en la página actual)
        const filas = document.querySelectorAll(".table tbody tr");

        filas.forEach(fila => {
            // Buscamos dentro de la celda de nombre (nombre-cli) y la de ID (text-neon)
            const nombreCompleto = fila.querySelector(".nombre-cli")?.innerText.toLowerCase() || "";
            const idCliente = fila.querySelector(".text-neon")?.innerText.toLowerCase() || "";

            // Si el texto coincide con el nombre o el ID, mostramos la fila
            if (nombreCompleto.includes(texto) || idCliente.includes(texto)) {
                fila.style.display = "";
            } else {
                fila.style.display = "none";
            }
        });
    }

    function editarCliente(id) {
        document.getElementById('modalTitulo').innerText = 'Editar Cliente';
        fetch(`/clientes/editar/${id}`)
            .then(res => res.json())
            .then(data => {
                document.getElementById('idCliente').value = data.idCliente;
                document.getElementById('nombre').value = data.nombre || '';
                document.getElementById('apellidoPat').value = data.apellidoPat || '';
                document.getElementById('apellidoMat').value = data.apellidoMat || '';
            });
    }

    function confirmarEliminar(id) {
        const isDark = document.body.classList.contains('dark-mode');
        Swal.fire({
            title: '¿Deshabilitar?',
            text: "Se moverá a inactivos.",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#ff4d4d',
            confirmButtonText: 'Sí, deshabilitar',
            background: isDark ? '#1a1d21' : '#fff',
            color: isDark ? '#fff' : '#000'
        }).then((result) => {
            if (result.isConfirmed) {
                // Redirigimos manteniendo el estado de inactivos
                window.location.href = `/clientes/eliminar/${id}?verInactivos=${CURRENT_VER_INACTIVOS}`;
            }
        });
    }

    function confirmarRestaurar(id) {
        const isDark = document.body.classList.contains('dark-mode');
        Swal.fire({
            title: '¿Restaurar?',
            icon: 'info',
            showCancelButton: true,
            confirmButtonColor: '#198754',
            confirmButtonText: 'Sí, restaurar',
            background: isDark ? '#1a1d21' : '#fff',
            color: isDark ? '#fff' : '#000'
        }).then((result) => {
            if (result.isConfirmed) {
                window.location.href = `/clientes/restaurar/${id}`;
            }
        });
    }

    function nuevoFormulario() {
        document.getElementById('modalTitulo').innerText = 'Nuevo Cliente';
        document.getElementById('idCliente').value = '';
        document.getElementById('nombre').value = '';
        document.getElementById('apellidoPat').value = '';
        document.getElementById('apellidoMat').value = '';
        setTimeout(() => document.getElementById('nombre').focus(), 450);
    }
</script>
</body>
</html>
