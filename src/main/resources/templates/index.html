<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Iniciar Sesión - Sistema de Ventas</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/login.css}" rel="stylesheet">
</head>
<body>

<img th:src="@{/img/logo1.png}" alt="Logo" class="logo">
<div class="main-title">SISTEMA DE VENTAS</div>

<div class="login-container">
    <h2>Inicia sesión</h2>
    <p class="text-muted small mb-4">Ingrese su usuario y contraseña</p>

    <div th:if="${error}" class="alert-custom" style="color: #d93025; background: #fce8e6; border-color: #f1998e;">
        <span th:text="${error}"></span>
    </div>
    <div th:if="${msg}" class="alert-custom" style="color: #188038; background: #e6f4ea; border-color: #82c91e;">
        <span th:text="${msg}"></span>
    </div>

    <form th:action="@{/login}" method="post">


        <input type="text" class="form-control" name="username" placeholder="Usuario" required>
        <input type="password" class="form-control" name="password" placeholder="Contraseña" required>

        <button type="submit" class="btn btn-login">Entrar</button>
    </form>

    <a href="#" class="forgot-password">¿Olvidó su contraseña?</a>
</div>

<footer>&copy; 2026 Sistema de Ventas</footer>

</body>
</html>
